# Design-Engineer Dependency Graph
# ─────────────────────────────────
# Maps all deliverables produced by the plugin and their relationships.
# When a deliverable is updated, downstream dependents should be reviewed.
#
# Status values: not_started | in_progress | complete
# Each deliverable tracks:
#   - status: current state
#   - depends_on: list of deliverables that must exist or inform this one
#   - informs: list of deliverables that should be reviewed when this one changes
#   - folder: subdirectory within the deliverables path
#   - phase: pipeline phase where this deliverable is primarily created
#   - skill: the skill that produces this deliverable
#   - last_updated: timestamp of last modification (set by the plugin)

deliverables:

  # ═══════════════════════════════════════════
  # PHASE 1: DISCOVERY & FOUNDATION
  # ═══════════════════════════════════════════

  problem-statement:
    status: not_started
    depends_on: []
    informs:
      - target-audience
      - assumptions
      - competitor-analysis
      - storybrand
      - business-plan
      - mvp-requirements
    folder: foundation
    phase: 1
    skill: ux-problem-statement
    last_updated: null

