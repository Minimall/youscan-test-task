<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YouScan — Brand intelligence</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/base/tokens.css">
  <link rel="stylesheet" href="css/base/reset.css">
  <link rel="stylesheet" href="css/base/layout.css">
  <link rel="stylesheet" href="css/components/buttons.css">
  <link rel="stylesheet" href="css/components/badges.css">
  <link rel="stylesheet" href="css/features/notification-center.css">
  <link rel="stylesheet" href="css/features/rule-editor.css">
  <link rel="stylesheet" href="css/features/forecast-chart.css">
  <link rel="stylesheet" href="css/features/rules-list.css">
  <link rel="stylesheet" href="css/features/edit-from-alert.css">
  <link rel="stylesheet" href="css/components/toast.css">
  <link rel="stylesheet" href="css/components/command-palette.css">
  <link rel="stylesheet" href="css/features/debug-panel.css">
  <link rel="stylesheet" href="css/base/polish.css">
</head>
<body>
  <div id="app">
    <aside id="sidebar">
      <div class="brand-workspace" id="brand-workspace">
        <span class="brand-name">Nike Ukraine</span>
        <svg class="workspace-chev" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="6 9 12 15 18 9"/>
        </svg>
      </div>
      <nav class="nav-scroll" id="nav-scroll"></nav>
      <div class="sidebar-dock" id="sidebar-dock"></div>
    </aside>

    <main>
      <header id="topbar">
        <div class="topbar-left" id="topbar-left"></div>
        <div class="topbar-right">
          <button class="icon-btn" title="Help" aria-label="Help" data-tip="Help (⌘K)" data-tip-pos="right" onclick="openCmdK()">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor">
              <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 17h-2v-2h2v2zm2.07-7.75-.9.92C13.45 12.9 13 13.5 13 15h-2v-.5c0-1.1.45-2.1 1.17-2.83l1.24-1.26c.37-.36.59-.86.59-1.41 0-1.1-.9-2-2-2s-2 .9-2 2H8c0-2.21 1.79-4 4-4s4 1.79 4 4c0 .88-.36 1.68-.93 2.25z"/>
            </svg>
          </button>
          <button class="topbar-icon-btn" id="notif-btn" title="Notifications" aria-label="Notifications" data-tip="Notifications" data-tip-pos="right">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
              <path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6v-5c0-3.07-1.64-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C9.64 5.36 8 7.93 8 11v5l-2 2v1h16v-1l-2-2z"/>
            </svg>
            <span class="topbar-icon-pill" id="notif-pill">2</span>
          </button>
          <button class="topbar-icon-btn" id="alerts-inbox-btn" title="Alerts inbox" aria-label="Alerts inbox" data-tip="Alerts inbox" data-tip-pos="right">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
              <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5v-4h2.78l1.11 1.5h6.22l1.11-1.5H19v4zm0-6h-4.5l-1.11 1.5h-2.78L9.5 13H5V5h14v8z"/>
            </svg>
            <span class="topbar-icon-pill" id="alerts-inbox-pill" style="display:none">0</span>
          </button>
          <div class="topbar-avatar" title="Kateryna P. · PR Specialist">KP</div>
        </div>
      </header>
      <div id="view"></div>
    </main>
  </div>

  <!-- Overlays -->
  <div class="overlay-backdrop" id="backdrop"></div>
  <aside class="notif-center" id="notif-center"></aside>
  <aside class="rule-editor-sidebar" id="rule-editor-sidebar"></aside>
  <div class="cmdk" id="cmdk"></div>
  <div id="toast-stack"></div>

  <!-- Debug panel -->
  <div id="debug">
    <div class="debug-fab" id="debug-fab">
      <span class="pulse"></span>
      <span>Demo controls</span>
      <kbd>D</kbd>
    </div>
    <div class="debug-panel" id="debug-panel"></div>
  </div>

  <script src="js/utils/icons.js"></script>
  <script src="js/data/mock-data.js"></script>
  <script src="js/data/state.js"></script>
  <script src="js/utils/time-utils.js"></script>
  <script src="js/utils/forecast-data-generator.js"></script>
  <script src="js/views/layout.js"></script>
  <script src="js/views/alerts-inbox.js"></script>
  <script src="js/views/rule-editor.js"></script>
  <script src="js/views/rules-list.js"></script>
  <script src="js/components/notification-center.js"></script>
  <script src="js/components/toast.js"></script>
  <script src="js/components/command-palette.js"></script>
  <script src="js/components/debug-panel.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
