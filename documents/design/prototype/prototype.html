<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YouScan — Brand intelligence</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /*═══ TOKENS ═══════════════════════════════════════════════════*/
    :root {
      --bg: #f7f7f5;
      --bg-card: #ffffff;
      --bg-hover: #f1f1ee;
      --bg-active: #e9e9e5;
      --bg-sunken: #efefec;
      --border: #e4e4e0;
      --border-mid: #d2d2cc;
      --border-strong: #b8b8b1;
      --text-1: #1c1c1a;
      --text-2: #5a5a55;
      --text-3: #6e6e68;
      --text-inverse: #f7f7f5;
      --critical: #c92a2a;
      --critical-soft: #fff1f0;
      --critical-border: #fca5a5;
      --important: #b45309;
      --important-soft: #fffbeb;
      --important-border: #fde68a;
      --info: #0369a1;
      --info-soft: #e0f2fe;
      --info-border: #7dd3fc;
      --success: #15803d;
      --success-soft: #dcfce7;
      --accent: #2563eb;
      --accent-soft: #eff6ff;
      --accent-hover: #1d4ed8;
      --accent-border: #bfdbfe;
      --destructive: #9b1b3b;
      --warn: #fbbf24;
      --r-sm: 3px;
      --r: 5px;
      --r-lg: 8px;
      --shadow-sm: 0 1px 2px rgba(28, 28, 26, .05);
      --shadow: 0 4px 12px rgba(28, 28, 26, .06), 0 2px 4px rgba(28, 28, 26, .04);
      --shadow-lg: 0 12px 32px rgba(28, 28, 26, .10), 0 4px 8px rgba(28, 28, 26, .06);
      --shadow-overlay: 0 -1px 0 var(--border), 0 24px 48px rgba(28, 28, 26, .16), 0 8px 16px rgba(28, 28, 26, .08);
      --t-fast: .12s;
      --t-base: .18s;
      --t-slow: .26s;
      --ease: cubic-bezier(.32, .72, 0, 1);
    }

    :root.dark {
      color-scheme: dark;
      --bg: #15151a;
      --bg-card: #1c1c22;
      --bg-hover: #23232b;
      --bg-active: #2a2a33;
      --bg-sunken: #101015;
      --border: #2a2a33;
      --border-mid: #3a3a44;
      --border-strong: #4a4a55;
      --text-1: #f0f0ec;
      --text-2: #a8a8a2;
      --text-3: #8a8a83;
      --text-inverse: #1c1c1a;
      --critical-soft: #3a1414;
      --critical-border: #7a2424;
      --important-soft: #3a2a10;
      --important-border: #7a5424;
      --info: #38bdf8;
      --info-soft: #0c2d3d;
      --info-border: #0369a1;
      --accent-soft: #1a2540;
      --accent-border: #2a4080;
      --success-soft: #103820;
    }

    /*═══ RESET ════════════════════════════════════════════════════*/
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    html,
    body {
      height: 100%;
      overflow: hidden
    }

    body {
      font-family: 'Inter', ui-sans-serif, system-ui, sans-serif;
      font-size: 14px;
      line-height: 1.5;
      background: var(--bg);
      color: var(--text-1);
      font-variant-numeric: tabular-nums;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility
    }

    button {
      font-family: inherit;
      font-size: inherit;
      cursor: pointer;
      border: none;
      background: none;
      color: inherit;
      touch-action: manipulation
    }

    input,
    select,
    textarea {
      font-family: inherit;
      font-size: inherit;
      color: inherit
    }

    a {
      color: var(--accent);
      text-decoration: none
    }

    a:hover {
      text-decoration: underline
    }

    ::selection {
      background: var(--accent);
      color: #fff
    }

    ::-webkit-scrollbar {
      width: 10px;
      height: 10px
    }

    ::-webkit-scrollbar-track {
      background: transparent
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border-mid);
      border-radius: 5px;
      border: 2px solid var(--bg)
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--border-strong)
    }

    /*═══ APP SHELL ════════════════════════════════════════════════*/
    #app {
      display: grid;
      grid-template-columns: 220px 1fr;
      height: 100vh;
      width: 100vw;
      overflow: hidden
    }

    #app.crisis-mode {
      filter: brightness(.92) contrast(1.04)
    }

    /*── SIDEBAR ──*/
    #sidebar {
      background: var(--bg-card);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      flex-shrink: 0
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0
    }

    .brand-mark {
      width: 24px;
      height: 24px;
      background: var(--text-1);
      color: var(--bg-card);
      border-radius: 5px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 13px;
      letter-spacing: -.02em
    }

    .brand-name {
      font-weight: 600;
      font-size: 13px;
      letter-spacing: -.01em
    }

    .workspace {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      flex-shrink: 0;
      transition: background var(--t-fast)
    }

    .workspace:hover {
      background: var(--bg-hover)
    }

    .workspace-avatar {
      width: 22px;
      height: 22px;
      border-radius: 5px;
      background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-weight: 600;
      font-size: 10px;
      flex-shrink: 0
    }

    .workspace-name {
      font-size: 12px;
      font-weight: 500;
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap
    }

    .workspace-chev {
      color: var(--text-3);
      flex-shrink: 0
    }

    .nav-scroll {
      flex: 1;
      overflow-y: auto;
      overscroll-behavior: contain;
      padding: 10px 8px
    }

    .nav-section {
      margin-bottom: 14px
    }

    .nav-section-label {
      padding: 4px 8px;
      font-size: 10px;
      font-weight: 600;
      color: var(--text-3);
      text-transform: uppercase;
      letter-spacing: .06em;
      display: flex;
      align-items: center;
      justify-content: space-between
    }

    .nav-section-label .add-btn {
      opacity: 0;
      width: 18px;
      height: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 3px;
      color: var(--text-3);
      transition: opacity var(--t-fast), background var(--t-fast)
    }

    .nav-section:hover .add-btn {
      opacity: 1
    }

    .add-btn:hover {
      background: var(--bg-active);
      color: var(--text-1)
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 6px 8px;
      border-radius: var(--r-sm);
      font-size: 13px;
      color: var(--text-2);
      cursor: pointer;
      transition: background var(--t-fast), color var(--t-fast), transform var(--t-fast);
      user-select: none;
      touch-action: manipulation
    }

    .nav-item:hover {
      background: var(--bg-hover);
      color: var(--text-1)
    }

    .nav-item.active {
      background: var(--bg-active);
      color: var(--text-1);
      font-weight: 500
    }

    .nav-item:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 1px
    }

    .nav-item .nav-icon {
      width: 15px;
      height: 15px;
      flex-shrink: 0;
      opacity: .75
    }

    .nav-item.active .nav-icon {
      opacity: 1
    }

    .nav-item-label {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap
    }

    .nav-count {
      font-size: 11px;
      color: var(--text-3);
      font-variant-numeric: tabular-nums
    }

    .nav-item.active .nav-count {
      color: var(--text-2)
    }

    .nav-children {
      margin-top: 2px;
      padding-left: 14px;
      display: flex;
      flex-direction: column;
      gap: 1px
    }

    .nav-child {
      padding: 5px 8px;
      font-size: 12px;
      color: var(--text-2);
      border-radius: var(--r-sm);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      transition: background var(--t-fast), color var(--t-fast), transform var(--t-fast);
      touch-action: manipulation
    }

    .nav-child:hover {
      background: var(--bg-hover);
      color: var(--text-1)
    }

    .nav-child:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 1px
    }

    .nav-child.active {
      background: var(--accent-soft);
      color: var(--accent);
      font-weight: 500
    }

    :root.dark .nav-child.active {
      color: #93c5fd
    }

    .nav-footer {
      padding: 10px 12px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0
    }

    .user-avatar {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: linear-gradient(135deg, #a78bfa, #7c3aed);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-weight: 600;
      font-size: 10px;
      flex-shrink: 0
    }

    .user-meta {
      flex: 1;
      min-width: 0
    }

    .user-name {
      font-size: 12px;
      font-weight: 500;
      line-height: 1.2;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap
    }

    .user-role {
      font-size: 11px;
      color: var(--text-3);
      line-height: 1.2;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap
    }

    /*── MAIN ──*/
    main {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-width: 0;
      background: var(--bg)
    }

    #topbar {
      height: 48px;
      background: var(--bg-card);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 14px;
      flex-shrink: 0;
      z-index: 5
    }

    .crumbs {
      display: flex;
      align-items: center;
      gap: 6px;
      flex: 1;
      min-width: 0;
      font-size: 13px
    }

    .crumb {
      color: var(--text-2);
      cursor: pointer;
      transition: color var(--t-fast);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap
    }

    .crumb:hover {
      color: var(--text-1)
    }

    .crumb.current {
      color: var(--text-1);
      font-weight: 500;
      cursor: default
    }

    .crumb-sep {
      color: var(--text-3);
      font-size: 11px;
      flex-shrink: 0
    }

    .search-pill {
      flex: 1;
      max-width: 360px;
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 5px 10px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      color: var(--text-3);
      cursor: pointer;
      transition: background var(--t-fast), border-color var(--t-fast);
      font-size: 12px
    }

    .search-pill:hover {
      background: var(--bg-hover);
      border-color: var(--border-mid);
      color: var(--text-2)
    }

    .search-pill kbd {
      font-family: inherit;
      font-size: 10px;
      padding: 1px 5px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 3px;
      color: var(--text-3);
      margin-left: auto
    }

    .topbar-actions {
      display: flex;
      align-items: center;
      gap: 4px
    }

    /*── BELL ──*/
    .icon-btn {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: var(--r-sm);
      color: var(--text-2);
      cursor: pointer;
      transition: background var(--t-fast), color var(--t-fast), transform var(--t-fast);
      position: relative;
      touch-action: manipulation
    }

    .icon-btn:hover {
      background: var(--bg-hover);
      color: var(--text-1)
    }

    .icon-btn.active {
      background: var(--bg-active);
      color: var(--text-1)
    }

    .icon-btn:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 1px
    }

    .bell-badge {
      position: absolute;
      top: 4px;
      right: 4px;
      min-width: 14px;
      height: 14px;
      padding: 0 4px;
      background: var(--accent);
      color: #fff;
      border-radius: 7px;
      font-size: 9px;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
      border: 1.5px solid var(--bg-card);
      font-variant-numeric: tabular-nums
    }

    .bell-badge.critical {
      background: var(--critical)
    }

    .bell-icon.critical {
      color: var(--critical)
    }

    /*═══ VIEW ════════════════════════════════════════════════════*/
    #view {
      flex: 1;
      display: flex;
      overflow: hidden;
      min-height: 0;
      position: relative
    }

    /*── ALERT LIST ──*/
    .list-pane {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      background: var(--bg);
      transition: flex var(--t-base) var(--ease)
    }

    .list-header {
      padding: 14px 20px 10px;
      border-bottom: 1px solid var(--border);
      background: var(--bg-card);
      display: flex;
      flex-direction: column;
      gap: 10px;
      flex-shrink: 0
    }

    .list-title-row {
      display: flex;
      align-items: center;
      gap: 12px
    }

    .list-title {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: -.01em;
      text-wrap: balance
    }

    .list-count {
      font-size: 12px;
      color: var(--text-3);
      font-variant-numeric: tabular-nums;
      background: var(--bg);
      padding: 2px 7px;
      border-radius: 10px;
      border: 1px solid var(--border)
    }

    .list-toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap
    }

    .tabs {
      display: flex;
      gap: 0;
      border-bottom: 0
    }

    .tab {
      padding: 6px 12px;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-2);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: color var(--t-fast), border-color var(--t-fast);
      margin-bottom: -11px;
      display: flex;
      align-items: center;
      gap: 6px;
      touch-action: manipulation
    }

    .tab:hover {
      color: var(--text-1)
    }

    .tab:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
      border-radius: var(--r-sm)
    }

    .tab.active {
      color: var(--text-1);
      border-bottom-color: var(--text-1)
    }

    .tab-count {
      font-size: 11px;
      color: var(--text-3);
      background: var(--bg);
      padding: 1px 6px;
      border-radius: 8px;
      font-variant-numeric: tabular-nums
    }

    .tab.active .tab-count {
      background: var(--bg-active);
      color: var(--text-2)
    }

    .filter-row {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap
    }

    .filter-pill {
      padding: 3px 10px;
      border-radius: 14px;
      border: 1px solid var(--border);
      font-size: 11px;
      color: var(--text-2);
      cursor: pointer;
      background: var(--bg-card);
      transition: background var(--t-fast), border-color var(--t-fast), color var(--t-fast), transform var(--t-fast);
      display: inline-flex;
      align-items: center;
      gap: 5px;
      white-space: nowrap;
      user-select: none;
      touch-action: manipulation
    }

    .filter-pill:hover {
      border-color: var(--border-strong);
      color: var(--text-1)
    }

    .filter-pill:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 1px
    }

    .filter-pill.active {
      background: var(--text-1);
      border-color: var(--text-1);
      color: var(--bg-card)
    }

    .filter-pill .pill-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%
    }

    .filter-pill .pill-x {
      font-size: 13px;
      line-height: 1;
      opacity: .6;
      margin-left: 2px
    }

    .list-search {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      max-width: 240px;
      flex: 1;
      min-width: 140px
    }

    .list-search input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      font-size: 12px
    }

    .list-search input::placeholder {
      color: var(--text-3)
    }

    .list-body {
      flex: 1;
      overflow-y: auto;
      overscroll-behavior: contain;
      background: var(--bg-card)
    }

    .list-section {
      position: sticky;
      top: 0;
      background: var(--bg-card);
      padding: 10px 20px 4px;
      font-size: 10px;
      font-weight: 600;
      color: var(--text-3);
      text-transform: uppercase;
      letter-spacing: .05em;
      border-bottom: 1px solid var(--border);
      z-index: 1
    }

    .alert-row {
      display: flex;
      align-items: stretch;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      background: var(--bg-card);
      position: relative;
      transition: background var(--t-fast);
      touch-action: manipulation
    }

    .alert-row:hover {
      background: var(--bg-hover)
    }

    .alert-row:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: -2px
    }

    .alert-row.selected {
      background: var(--accent-soft)
    }

    :root.dark .alert-row.selected {
      background: rgba(37, 99, 235, .08)
    }

    .alert-row.read {
      opacity: .6
    }

    .alert-row.removing {
      animation: rowRemove .26s var(--ease) forwards
    }

    @keyframes rowRemove {
      to {
        opacity: 0;
        transform: translateX(-12px);
        max-height: 0;
        padding: 0;
        border: 0
      }
    }

    .alert-row.entering {
      animation: rowEnter .32s var(--ease)
    }

    @keyframes rowEnter {
      from {
        opacity: 0;
        transform: translateY(-8px);
        background: var(--accent-soft)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    .alert-bar {
      width: 4px;
      flex-shrink: 0;
      align-self: stretch
    }

    .bar-critical {
      background: var(--critical)
    }

    .bar-important {
      background: var(--important)
    }

    .bar-info {
      background: var(--info)
    }

    .alert-main {
      flex: 1;
      padding: 11px 16px 11px 14px;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 3px
    }

    .alert-title-row {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0
    }

    .alert-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-1);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
      min-width: 0
    }

    .alert-row.read .alert-title {
      font-weight: 400;
      color: var(--text-2)
    }

    .alert-time {
      font-size: 11px;
      color: var(--text-3);
      white-space: nowrap;
      flex-shrink: 0;
      font-variant-numeric: tabular-nums
    }

    .alert-meta {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--text-3);
      min-width: 0
    }

    .alert-meta>* {
      flex-shrink: 0
    }

    .alert-meta .meta-summary {
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--text-2)
    }

    .dot-sep {
      color: var(--text-3);
      font-size: 9px
    }

    .alert-actions {
      display: flex;
      align-items: center;
      gap: 2px;
      padding: 0 12px;
      opacity: 0;
      pointer-events: none;
      transition: opacity var(--t-fast)
    }

    .alert-row:hover .alert-actions {
      opacity: 1;
      pointer-events: auto
    }

    .row-action {
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: var(--r-sm);
      color: var(--text-3);
      transition: background var(--t-fast), color var(--t-fast);
      touch-action: manipulation
    }

    .row-action:hover {
      background: var(--bg-active);
      color: var(--text-1)
    }

    .row-action:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 1px
    }

    .unread-indicator {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--accent);
      align-self: center;
      margin-right: 14px;
      flex-shrink: 0
    }

    .alert-row.read .unread-indicator {
      visibility: hidden
    }

    /*── EMPTY STATES ──*/
    .empty {
      padding: 60px 24px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      color: var(--text-2)
    }

    .empty-icon {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: var(--bg);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-3)
    }

    .empty-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-1);
      text-wrap: balance
    }

    .empty-body {
      font-size: 13px;
      color: var(--text-2);
      max-width: 340px;
      line-height: 1.55;
      text-wrap: pretty
    }

    /*── DETAIL PANE ──*/
    .detail-pane {
      width: 480px;
      flex-shrink: 0;
      background: var(--bg-card);
      border-left: 1px solid var(--border);
      box-shadow: -2px 0 12px rgba(28, 28, 26, .04);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      animation: detailIn var(--t-slow) var(--ease)
    }

    @keyframes detailIn {
      from {
        transform: translateX(20px);
        opacity: 0
      }

      to {
        transform: translateX(0);
        opacity: 1
      }
    }

    .detail-header {
      padding: 16px 20px 14px;
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex-shrink: 0
    }

    .detail-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px
    }

    .detail-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      color: var(--text-3)
    }

    .detail-title {
      font-size: 16px;
      font-weight: 600;
      letter-spacing: -.01em;
      line-height: 1.3;
      text-wrap: balance
    }

    .detail-sublink {
      font-size: 12px;
      color: var(--text-2);
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 6px
    }

    .detail-sublink a {
      color: var(--text-2)
    }

    .detail-sublink a:hover {
      color: var(--accent)
    }

    .detail-body {
      flex: 1;
      overflow-y: auto;
      overscroll-behavior: contain;
      padding: 18px 20px;
      display: flex;
      flex-direction: column;
      gap: 18px
    }

    .detail-section {
      display: flex;
      flex-direction: column;
      gap: 8px
    }

    .section-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .07em;
      color: var(--text-3)
    }

    .condition-banner {
      padding: 11px 14px;
      border-radius: var(--r);
      font-size: 13px;
      font-weight: 500;
      line-height: 1.45;
      display: flex;
      align-items: flex-start;
      gap: 10px
    }

    .condition-banner.critical {
      background: var(--critical-soft);
      border: 1px solid var(--critical-border);
      border-left: 3px solid var(--critical);
      padding-left: 12px;
      color: var(--critical)
    }

    .condition-banner.important {
      background: var(--important-soft);
      border: 1px solid var(--important-border);
      color: var(--important)
    }

    .condition-banner.info {
      background: var(--info-soft);
      border: 1px solid var(--info-border);
      color: var(--info)
    }

    .condition-banner-icon {
      flex-shrink: 0;
      margin-top: 1px
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 5px
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      padding: 3px 8px;
      font-size: 11px;
      color: var(--text-1);
      font-weight: 500
    }

    .chip-key {
      color: var(--text-3);
      font-weight: 400
    }

    .mention-card {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 12px
    }

    .mention-card+.mention-card {
      margin-top: 8px
    }

    .mention-head {
      display: flex;
      align-items: center;
      gap: 9px;
      margin-bottom: 8px
    }

    .mention-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--border-mid), var(--border-strong));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 600;
      color: var(--bg-card);
      flex-shrink: 0
    }

    .mention-author {
      font-size: 12px;
      font-weight: 500;
      line-height: 1.2
    }

    .mention-platform {
      font-size: 11px;
      color: var(--text-3);
      display: flex;
      align-items: center;
      gap: 5px;
      line-height: 1.2
    }

    .verified-badge {
      color: var(--accent);
      display: inline-flex;
      align-items: center
    }

    .mention-text {
      font-size: 13px;
      line-height: 1.6;
      color: var(--text-1);
      text-wrap: pretty
    }

    .mention-text mark {
      background: #fef3c7;
      color: #78350f;
      border-radius: 2px;
      padding: 0 2px;
      font-style: normal;
      font-weight: 500
    }

    :root.dark .mention-text mark {
      background: #5c4810;
      color: #fde68a
    }

    .mention-foot {
      margin-top: 8px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 11px;
      color: var(--text-3)
    }

    .mention-stat {
      display: flex;
      align-items: center;
      gap: 4px
    }

    .detail-footer {
      padding: 12px 20px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
      background: var(--bg-card)
    }

    /*═══ BUTTONS ═════════════════════════════════════════════════*/
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border-radius: var(--r-sm);
      font-size: 12.5px;
      font-weight: 500;
      transition: background var(--t-fast), border-color var(--t-fast), color var(--t-fast), transform var(--t-fast);
      cursor: pointer;
      border: 1px solid transparent;
      white-space: nowrap;
      line-height: 1.4;
      user-select: none;
      touch-action: manipulation
    }

    .btn:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 1px
    }

    .btn-primary {
      background: var(--text-1);
      color: var(--bg-card);
      border-color: var(--text-1)
    }

    .btn-primary:hover {
      background: #000
    }

    :root.dark .btn-primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff
    }

    :root.dark .btn-primary:hover {
      background: var(--accent-hover);
      border-color: var(--accent-hover)
    }

    .btn-secondary {
      background: var(--bg-card);
      color: var(--text-1);
      border-color: var(--border-mid)
    }

    .btn-secondary:hover {
      background: var(--bg-hover);
      border-color: var(--border-strong)
    }

    .btn-ghost {
      background: transparent;
      color: var(--text-2);
      border-color: transparent
    }

    .btn-ghost:hover {
      background: var(--bg-hover);
      color: var(--text-1)
    }

    .btn-danger {
      background: var(--bg-card);
      color: var(--destructive);
      border-color: var(--border-mid)
    }

    .btn-danger:hover {
      background: #fff1f4;
      border-color: var(--destructive)
    }

    :root.dark .btn-danger:hover {
      background: #3a1a24
    }

    .btn-sm {
      padding: 4px 9px;
      font-size: 12px
    }

    .btn-icon {
      padding: 6px;
      width: 30px;
      justify-content: center
    }

    .btn[disabled] {
      opacity: .5;
      cursor: not-allowed
    }

    /*═══ SEVERITY BADGE ══════════════════════════════════════════*/
    .sev {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 11px;
      line-height: 1.4;
      letter-spacing: .01em
    }

    .sev-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: currentColor
    }

    .sev.critical {
      background: var(--critical);
      color: #fff;
      border: 1px solid var(--critical)
    }

    .sev.important {
      background: var(--important-soft);
      color: var(--important);
      border: 1px solid var(--important-border)
    }

    .sev.info {
      background: var(--info-soft);
      color: var(--info);
      border: 1px solid var(--info-border)
    }

    .sev.muted {
      background: var(--bg);
      color: var(--text-3);
      border: 1px solid var(--border)
    }

    /*═══ NOTIFICATION CENTER ═════════════════════════════════════*/
    .overlay-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(28, 28, 26, .16);
      backdrop-filter: blur(2px);
      -webkit-backdrop-filter: blur(2px);
      opacity: 0;
      pointer-events: none;
      transition: opacity var(--t-base) var(--ease);
      z-index: 60
    }

    .overlay-backdrop.show {
      opacity: 1;
      pointer-events: auto
    }

    :root.dark .overlay-backdrop {
      background: rgba(0, 0, 0, .4)
    }

    .notif-center {
      position: fixed;
      top: 0;
      right: 0;
      height: 100vh;
      width: 420px;
      max-width: 92vw;
      background: var(--bg-card);
      border-left: 1px solid var(--border);
      box-shadow: var(--shadow-overlay);
      display: flex;
      flex-direction: column;
      z-index: 70;
      transform: translateX(100%);
      transition: transform var(--t-base) var(--ease)
    }

    .notif-center.open {
      transform: translateX(0)
    }

    .notif-head {
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0
    }

    .notif-title {
      font-size: 14px;
      font-weight: 600;
      flex: 1
    }

    .notif-tabs {
      display: flex;
      gap: 0;
      border-bottom: 1px solid var(--border);
      padding: 0 12px;
      flex-shrink: 0
    }

    .notif-tab {
      padding: 8px 14px;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-2);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: color var(--t-fast), border-color var(--t-fast);
      display: flex;
      align-items: center;
      gap: 6px;
      touch-action: manipulation
    }

    .notif-tab:hover {
      color: var(--text-1)
    }

    .notif-tab:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
      border-radius: var(--r-sm)
    }

    .notif-tab.active {
      color: var(--text-1);
      border-bottom-color: var(--text-1)
    }

    .notif-body {
      flex: 1;
      overflow-y: auto;
      overscroll-behavior: contain
    }

    .notif-day-label {
      padding: 10px 18px 4px;
      font-size: 10px;
      font-weight: 600;
      color: var(--text-3);
      text-transform: uppercase;
      letter-spacing: .05em;
      background: var(--bg-card);
      position: sticky;
      top: 0;
      z-index: 1
    }

    .notif-row {
      display: flex;
      align-items: stretch;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background var(--t-fast)
    }

    .notif-row:hover {
      background: var(--bg-hover)
    }

    .notif-row.unread {
      background: var(--bg-card)
    }

    .notif-row.read {
      background: var(--bg-sunken);
      opacity: .78
    }

    .notif-row-bar {
      width: 4px;
      flex-shrink: 0
    }

    .notif-row-body {
      flex: 1;
      padding: 10px 14px 10px 12px;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 2px
    }

    .notif-row-top {
      display: flex;
      align-items: center;
      gap: 8px
    }

    .notif-row-name {
      font-size: 12.5px;
      font-weight: 500;
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap
    }

    .notif-row-time {
      font-size: 10.5px;
      color: var(--text-3);
      white-space: nowrap;
      flex-shrink: 0
    }

    .notif-row-summary {
      font-size: 11.5px;
      color: var(--text-2);
      line-height: 1.4;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap
    }

    .notif-row-actions {
      display: flex;
      gap: 4px;
      margin-top: 6px;
      opacity: 0;
      pointer-events: none;
      transition: opacity var(--t-fast)
    }

    .notif-row:hover .notif-row-actions {
      opacity: 1;
      pointer-events: auto
    }

    .notif-foot {
      padding: 10px 18px;
      border-top: 1px solid var(--border);
      font-size: 12px;
      flex-shrink: 0;
      text-align: center
    }

    /*═══ RULE EDITOR ═════════════════════════════════════════════*/
    .rule-editor {
      flex: 1;
      display: flex;
      overflow: hidden;
      background: var(--bg)
    }

    .rule-form {
      flex: 1;
      overflow-y: auto;
      overscroll-behavior: contain;
      padding: 24px 28px;
      background: var(--bg-card);
      min-width: 0
    }

    .rule-chart-side {
      width: 380px;
      flex-shrink: 0;
      border-left: 1px solid var(--border);
      background: var(--bg);
      overflow-y: auto;
      overscroll-behavior: contain;
      padding: 24px
    }

    .rule-form.compact {
      padding: 16px 18px
    }

    .rule-chart-side.compact {
      width: 100%;
      border-left: none;
      border-top: 1px solid var(--border);
      padding: 16px 18px
    }

    .field {
      margin-bottom: 18px
    }

    .field-label {
      font-size: 10px;
      font-weight: 700;
      color: var(--text-3);
      text-transform: uppercase;
      letter-spacing: .07em;
      margin-bottom: 7px;
      display: block
    }

    .field-row {
      display: flex;
      align-items: center;
      gap: 7px;
      flex-wrap: wrap;
      line-height: 1.8
    }

    .field-text {
      font-size: 13px;
      color: var(--text-1)
    }

    .field-input {
      background: var(--bg);
      border: 1px solid var(--border-mid);
      border-radius: var(--r-sm);
      padding: 5px 9px;
      font-size: 13px;
      color: var(--text-1);
      width: 100%;
      max-width: 340px;
      transition: border-color var(--t-fast), box-shadow var(--t-fast)
    }

    .field-input:focus-visible {
      outline: none;
      border-color: var(--accent);
      background: var(--bg-card);
      box-shadow: 0 0 0 3px var(--accent-soft)
    }

    .inline-input {
      width: 54px;
      text-align: center;
      padding: 3px 6px
    }

    .inline-select {
      display: inline-flex;
      align-items: center;
      background: var(--bg);
      border: 1px solid var(--border-mid);
      border-radius: var(--r-sm);
      padding: 3px 4px 3px 8px;
      font-size: 13px;
      cursor: pointer;
      transition: border-color var(--t-fast), background var(--t-fast)
    }

    .inline-select:hover {
      border-color: var(--border-strong);
      background: var(--bg-card)
    }

    .inline-select select {
      background: transparent;
      border: none;
      outline: none;
      cursor: pointer;
      padding-right: 4px;
      color: var(--text-1)
    }

    .preset-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 10px;
      max-width: 780px;
      margin-bottom: 24px
    }

    .preset-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      cursor: pointer;
      transition: border-color var(--t-fast), box-shadow var(--t-fast), transform var(--t-fast);
      text-align: left;
      touch-action: manipulation
    }

    .preset-card:hover {
      border-color: var(--border-strong);
      transform: translateY(-1px);
      box-shadow: var(--shadow-sm)
    }

    .preset-card:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 1px
    }

    .preset-card.selected {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-soft)
    }

    .preset-icon {
      width: 28px;
      height: 28px;
      border-radius: var(--r-sm);
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 10px
    }

    .preset-name {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 3px;
      text-wrap: balance
    }

    .preset-desc {
      font-size: 11.5px;
      color: var(--text-2);
      line-height: 1.45;
      text-wrap: pretty
    }

    .summary-box {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 12px 14px;
      margin-top: 8px;
      transition: border-color var(--t-base)
    }

    .summary-box.flash {
      animation: summaryFlash 1s var(--ease)
    }

    @keyframes summaryFlash {
      0% {
        border-color: var(--accent);
        background: var(--accent-soft)
      }

      100% {
        border-color: var(--border);
        background: var(--bg)
      }
    }

    .summary-label {
      font-size: 9.5px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--text-3);
      margin-bottom: 5px
    }

    .summary-text {
      font-size: 13px;
      color: var(--text-1);
      line-height: 1.55
    }

    .summary-text em {
      font-style: normal;
      font-weight: 600;
      color: var(--text-1);
      background: var(--bg-active);
      padding: 0 4px;
      border-radius: 3px
    }

    /*═══ FORECAST CHART ══════════════════════════════════════════*/
    .fc-head {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px
    }

    .fc-stat {
      display: flex;
      flex-direction: column;
      gap: 2px
    }

    .fc-stat-num {
      font-size: 24px;
      font-weight: 600;
      letter-spacing: -.02em;
      line-height: 1.1;
      font-variant-numeric: tabular-nums
    }

    .fc-stat-label {
      font-size: 11px;
      color: var(--text-2)
    }

    .fc-meta {
      font-size: 10.5px;
      color: var(--text-3);
      text-align: right;
      line-height: 1.45
    }

    .fc-chart {
      position: relative;
      padding: 6px 0 18px
    }

    .fc-bars {
      display: flex;
      align-items: flex-end;
      gap: 3px;
      height: 96px
    }

    .fc-bar {
      flex: 1;
      background: var(--info);
      opacity: .5;
      border-radius: 2px 2px 0 0;
      cursor: pointer;
      transition: opacity var(--t-fast), background var(--t-fast), transform var(--t-fast);
      min-width: 4px;
      position: relative
    }

    .fc-bar:hover {
      opacity: 1;
      transform: scaleY(1.04);
      transform-origin: bottom
    }

    .fc-bar.active {
      opacity: 1;
      background: var(--accent)
    }

    .fc-bar.warn {
      background: var(--warn);
      opacity: .85
    }

    .fc-bar.warn.active {
      background: #d97706;
      opacity: 1
    }

    .fc-bar.zero {
      background: var(--border-mid);
      opacity: .55;
      height: 2px !important
    }

    .fc-axis {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      display: flex;
      justify-content: space-between;
      font-size: 10px;
      color: var(--text-3);
      font-variant-numeric: tabular-nums
    }

    .fc-baseline {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 18px;
      height: 1px;
      background: var(--border)
    }

    .fc-tip {
      position: absolute;
      background: var(--text-1);
      color: var(--bg-card);
      font-size: 11px;
      padding: 4px 8px;
      border-radius: 3px;
      pointer-events: none;
      white-space: nowrap;
      z-index: 10;
      font-weight: 500;
      transform: translate(-50%, -100%);
      margin-top: -6px
    }

    .fc-tip::after {
      content: '';
      position: absolute;
      top: 100%;
      left: 50%;
      transform: translateX(-50%);
      border: 4px solid transparent;
      border-top-color: var(--text-1)
    }

    .warn-strip {
      background: var(--important-soft);
      border: 1px solid var(--important-border);
      border-radius: var(--r);
      padding: 10px 12px;
      font-size: 12px;
      color: var(--important);
      line-height: 1.5;
      display: flex;
      align-items: flex-start;
      gap: 9px;
      margin-bottom: 14px
    }

    .warn-strip strong {
      font-weight: 600
    }

    .warn-strip-icon {
      flex-shrink: 0;
      margin-top: 1px
    }

    .samples-box {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 12px;
      margin-top: 14px
    }

    .samples-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
      font-size: 12px;
      font-weight: 500
    }

    .samples-day {
      color: var(--text-1)
    }

    .samples-sub {
      font-size: 11px;
      color: var(--text-3);
      font-weight: 400
    }

    /*═══ TABLE (Rules list) ══════════════════════════════════════*/
    .tbl-wrap {
      padding: 18px 24px;
      flex: 1;
      overflow: auto;
      background: var(--bg)
    }

    .tbl {
      width: 100%;
      border-collapse: collapse;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--r);
      overflow: hidden
    }

    .tbl th {
      text-align: left;
      padding: 9px 14px;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .05em;
      color: var(--text-3);
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
      background: var(--bg-card);
      position: sticky;
      top: 0
    }

    .tbl td {
      padding: 11px 14px;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
      font-size: 13px
    }

    .tbl tr:last-child td {
      border-bottom: none
    }

    .tbl tbody tr {
      cursor: pointer;
      transition: background var(--t-fast)
    }

    .tbl tbody tr:hover {
      background: var(--bg-hover)
    }

    .tbl tbody tr.zero-fire td {
      opacity: .5
    }

    .num {
      text-align: right;
      font-variant-numeric: tabular-nums
    }

    .health-warn {
      color: var(--important);
      font-weight: 500
    }

    .health-crit {
      color: var(--critical);
      font-weight: 500
    }

    .row-actions-cell {
      width: 1px;
      white-space: nowrap
    }

    .row-actions-cell .actions {
      display: flex;
      gap: 2px;
      opacity: 0;
      pointer-events: none;
      transition: opacity var(--t-fast)
    }

    .tbl tbody tr:hover .row-actions-cell .actions {
      opacity: 1;
      pointer-events: auto
    }

    .rule-cell {
      display: flex;
      align-items: center;
      gap: 10px
    }

    .rule-bar {
      width: 3px;
      height: 18px;
      border-radius: 2px;
      flex-shrink: 0
    }

    /*═══ EDIT-FROM-ALERT (split panel inside detail pane) ══════════*/
    .detail-pane.with-editor {
      width: 820px
    }

    .editor-panel {
      position: absolute;
      top: 0;
      right: 0;
      height: 100%;
      width: 440px;
      background: var(--bg-card);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: var(--shadow-overlay);
      transform: translateX(100%);
      transition: transform var(--t-base) var(--ease);
      z-index: 8
    }

    .editor-panel.open {
      transform: translateX(0)
    }

    .editor-panel-head {
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
      flex-shrink: 0
    }

    .editor-panel-head .ep-context {
      font-size: 10.5px;
      color: var(--text-3);
      text-transform: uppercase;
      letter-spacing: .05em;
      margin-bottom: 3px;
      display: flex;
      align-items: center;
      gap: 5px
    }

    .editor-panel-head .ep-title {
      font-size: 14px;
      font-weight: 600;
      line-height: 1.3
    }

    .editor-panel-body {
      flex: 1;
      overflow-y: auto;
      padding: 16px 18px
    }

    .editor-panel-foot {
      padding: 11px 16px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
      background: var(--bg-card)
    }

    .editor-divider {
      height: 1px;
      background: var(--border);
      margin: 14px 0
    }

    /*═══ TOAST ══════════════════════════════════════════════════*/
    #toast-stack {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column-reverse;
      gap: 8px;
      z-index: 200;
      pointer-events: none
    }

    .toast {
      background: var(--text-1);
      color: var(--text-inverse);
      font-size: 13px;
      padding: 10px 14px;
      border-radius: var(--r);
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: var(--shadow-lg);
      pointer-events: auto;
      animation: toastIn .26s var(--ease);
      min-width: 280px;
      position: relative;
      overflow: hidden
    }

    .toast.leaving {
      animation: toastOut .22s var(--ease) forwards
    }

    @keyframes toastIn {
      from {
        opacity: 0;
        transform: translateY(20px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    @keyframes toastOut {
      to {
        opacity: 0;
        transform: translateY(6px)
      }
    }

    .toast-icon {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center
    }

    .toast-text {
      flex: 1;
      line-height: 1.4
    }

    .toast-action {
      color: #93c5fd;
      font-weight: 500;
      font-size: 12.5px;
      cursor: pointer;
      flex-shrink: 0;
      padding: 2px 6px;
      border-radius: 3px;
      transition: background var(--t-fast)
    }

    .toast-action:hover {
      background: rgba(255, 255, 255, .1)
    }

    .toast-progress {
      position: absolute;
      left: 0;
      bottom: 0;
      height: 2px;
      background: #3b82f6;
      width: 100%;
      transform-origin: left;
      animation: progress 8s linear forwards
    }

    @keyframes progress {
      to {
        transform: scaleX(0)
      }
    }

    :root.dark .toast {
      background: #2a2a33;
      border: 1px solid var(--border)
    }

    /*═══ COMMAND PALETTE ════════════════════════════════════════*/
    .cmdk {
      position: fixed;
      top: 18%;
      left: 50%;
      transform: translateX(-50%) scale(.96);
      width: 560px;
      max-width: 92vw;
      background: var(--bg-card);
      border: 1px solid var(--border-mid);
      border-radius: var(--r-lg);
      box-shadow: var(--shadow-lg);
      z-index: 80;
      opacity: 0;
      pointer-events: none;
      transition: transform var(--t-base) var(--ease), opacity var(--t-base) var(--ease)
    }

    .cmdk.open {
      opacity: 1;
      pointer-events: auto;
      transform: translateX(-50%) scale(1)
    }

    .cmdk-input-wrap {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 13px 16px;
      border-bottom: 1px solid var(--border)
    }

    .cmdk-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      font-size: 14px;
      color: var(--text-1)
    }

    .cmdk-input::placeholder {
      color: var(--text-3)
    }

    .cmdk-list {
      max-height: 340px;
      overflow-y: auto;
      overscroll-behavior: contain;
      padding: 6px 6px 8px
    }

    .cmdk-section {
      font-size: 10px;
      font-weight: 600;
      color: var(--text-3);
      text-transform: uppercase;
      letter-spacing: .05em;
      padding: 8px 10px 4px
    }

    .cmdk-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 7px 10px;
      border-radius: var(--r-sm);
      cursor: pointer;
      font-size: 13px
    }

    .cmdk-item.active {
      background: var(--bg-active)
    }

    .cmdk-item-icon {
      width: 14px;
      height: 14px;
      color: var(--text-3);
      flex-shrink: 0
    }

    .cmdk-item-shortcut {
      margin-left: auto;
      font-size: 11px;
      color: var(--text-3)
    }

    /*═══ DEBUG PANEL (floating) ═════════════════════════════════*/
    #debug {
      position: fixed;
      bottom: 20px;
      left: 20%;
      z-index: 300;
      font-family: 'Inter', sans-serif
    }

    .debug-fab {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      background: #1c1c1a;
      color: #f0f0ec;
      border-radius: 20px;
      box-shadow: var(--shadow-lg);
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      border: 1px solid #2a2a28;
      transition: transform var(--t-fast), background var(--t-fast)
    }

    .debug-fab:hover {
      background: #2a2a28;
      transform: translateY(-1px)
    }

    .debug-fab.hidden {
      display: none
    }

    .debug-fab .pulse {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #22c55e;
      box-shadow: 0 0 0 3px rgba(34, 197, 94, .18);
      animation: pulse 2s ease infinite
    }

    @keyframes pulse {

      0%,
      100% {
        box-shadow: 0 0 0 0 rgba(34, 197, 94, .4)
      }

      50% {
        box-shadow: 0 0 0 6px rgba(34, 197, 94, 0)
      }
    }

    .debug-fab kbd {
      font-family: inherit;
      font-size: 10px;
      padding: 1px 5px;
      background: rgba(255, 255, 255, .08);
      border: 1px solid rgba(255, 255, 255, .12);
      border-radius: 3px;
      color: #a8a8a2
    }

    .debug-panel {
      width: 300px;
      background: #1c1c1a;
      color: #f0f0ec;
      border-radius: var(--r-lg);
      box-shadow: var(--shadow-lg);
      border: 1px solid #2a2a28;
      overflow: hidden;
      display: none;
      flex-direction: column;
      max-height: calc(100vh - 60px)
    }

    .debug-panel.open {
      display: flex;
      animation: debugIn .2s var(--ease)
    }

    @keyframes debugIn {
      from {
        opacity: 0;
        transform: translateY(8px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    .debug-header {
      padding: 11px 14px;
      border-bottom: 1px solid #2a2a28;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0
    }

    .debug-title {
      font-size: 12px;
      font-weight: 600;
      flex: 1;
      display: flex;
      align-items: center;
      gap: 7px
    }

    .debug-title .pulse {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #22c55e
    }

    .debug-close {
      width: 22px;
      height: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 3px;
      color: #74746e;
      cursor: pointer;
      transition: background var(--t-fast), color var(--t-fast)
    }

    .debug-close:hover {
      background: #2a2a28;
      color: #f0f0ec
    }

    .debug-body {
      flex: 1;
      overflow-y: auto;
      padding: 6px 0
    }

    .debug-section {
      padding: 8px 14px
    }

    .debug-section+.debug-section {
      border-top: 1px solid #2a2a28
    }

    .debug-section-label {
      font-size: 9.5px;
      font-weight: 600;
      color: #74746e;
      text-transform: uppercase;
      letter-spacing: .07em;
      margin-bottom: 6px
    }

    .debug-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 5px
    }

    .debug-btn {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 7px 9px;
      background: #2a2a28;
      border: 1px solid #2a2a28;
      color: #d6d6d0;
      border-radius: 4px;
      font-size: 11.5px;
      font-weight: 500;
      cursor: pointer;
      transition: background var(--t-fast), border-color var(--t-fast), color var(--t-fast);
      text-align: left
    }

    .debug-btn:hover {
      background: #34342f;
      border-color: #3a3a34;
      color: #f0f0ec
    }

    .debug-btn .dbtn-icon {
      flex-shrink: 0;
      width: 12px;
      height: 12px;
      color: #74746e
    }

    .debug-btn:hover .dbtn-icon {
      color: #f0f0ec
    }

    .debug-btn.danger:hover {
      background: #3a1818;
      border-color: #7a2424;
      color: #fca5a5
    }

    .debug-btn.danger:hover .dbtn-icon {
      color: #fca5a5
    }

    .debug-btn-full {
      grid-column: 1/-1
    }

    .debug-toggle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 9px;
      background: #23231f;
      border-radius: 4px;
      font-size: 11.5px;
      cursor: pointer;
      color: #d6d6d0;
      transition: background var(--t-fast)
    }

    .debug-toggle:hover {
      background: #2a2a28
    }

    .debug-toggle-switch {
      width: 26px;
      height: 14px;
      background: #3a3a34;
      border-radius: 8px;
      position: relative;
      flex-shrink: 0;
      transition: background var(--t-fast)
    }

    .debug-toggle-switch::after {
      content: '';
      position: absolute;
      left: 2px;
      top: 2px;
      width: 10px;
      height: 10px;
      background: #74746e;
      border-radius: 50%;
      transition: left var(--t-fast), background var(--t-fast)
    }

    .debug-toggle.on .debug-toggle-switch {
      background: #22c55e
    }

    .debug-toggle.on .debug-toggle-switch::after {
      left: 14px;
      background: #fff
    }

    .debug-stats {
      display: flex;
      flex-direction: column;
      gap: 3px;
      font-size: 11px;
      color: #a8a8a2
    }

    .debug-stat {
      display: flex;
      justify-content: space-between;
      padding: 2px 0
    }

    .debug-stat-val {
      color: #f0f0ec;
      font-variant-numeric: tabular-nums;
      font-weight: 500
    }

    /*═══ MISC ═══════════════════════════════════════════════════*/
    .divider {
      height: 1px;
      background: var(--border);
      margin: 14px 0
    }

    .muted {
      color: var(--text-3)
    }

    .mono {
      font-feature-settings: "tnum";
      font-variant-numeric: tabular-nums
    }

    .spinner {
      width: 14px;
      height: 14px;
      border: 1.5px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite
    }

    @keyframes spin {
      to {
        transform: rotate(360deg)
      }
    }

    .dot-flash {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--critical);
      box-shadow: 0 0 0 0 rgba(201, 42, 42, .5);
      animation: dotPulse 1.6s ease infinite
    }

    @keyframes dotPulse {
      0% {
        box-shadow: 0 0 0 0 rgba(201, 42, 42, .5)
      }

      70% {
        box-shadow: 0 0 0 8px rgba(201, 42, 42, 0)
      }

      100% {
        box-shadow: 0 0 0 0 rgba(201, 42, 42, 0)
      }
    }

    /*═══ RESPONSIVE ═════════════════════════════════════════════*/
    @media (max-width:1100px) {
      .detail-pane {
        width: 420px
      }

      .detail-pane.with-editor {
        width: 760px
      }

      .rule-chart-side {
        width: 340px
      }
    }

    @media (max-width:1300px) {
      .detail-pane.with-editor .editor-panel {
        width: 400px
      }
    }

    @media (max-width:900px) {
      #app {
        grid-template-columns: 60px 1fr
      }

      .brand-name,
      .workspace-name,
      .workspace-chev,
      .user-meta,
      .nav-item-label,
      .nav-count,
      .nav-section-label,
      .nav-children {
        display: none
      }

      .nav-item {
        justify-content: center;
        padding: 8px
      }

      .workspace {
        justify-content: center
      }

      .nav-footer {
        justify-content: center
      }

      .detail-pane {
        position: absolute;
        top: 0;
        right: 0;
        height: 100%;
        width: min(420px, 90vw);
        box-shadow: var(--shadow-overlay);
        z-index: 10
      }
    }

    @media (max-width:640px) {
      #app {
        grid-template-columns: 1fr
      }

      #sidebar {
        display: none
      }

      .list-header {
        padding: 12px 14px 8px
      }

      .list-title {
        font-size: 16px
      }

      .alert-main {
        padding: 10px 12px
      }

      .rule-editor {
        flex-direction: column
      }

      .rule-chart-side {
        width: 100%;
        border-left: none;
        border-top: 1px solid var(--border)
      }

      .detail-pane {
        width: 100vw
      }

      #toast-stack {
        left: 12px;
        right: 12px;
        transform: none
      }

      .toast {
        min-width: 0;
        width: 100%
      }
    }

    /*═══ REDUCED MOTION ══════════════════════════════════════════*/
    @media (prefers-reduced-motion: reduce) {

      *,
      *::before,
      *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }

    /*═══ POLISH ══════════════════════════════════════════════════*/
    /* Scale on press — tactile feedback */
    .btn:active:not([disabled]) {
      transform: scale(0.96)
    }

    .icon-btn:active {
      transform: scale(0.96)
    }

    .filter-pill:active {
      transform: scale(0.96)
    }

    .nav-item:active {
      transform: scale(0.97)
    }

    .nav-child:active {
      transform: scale(0.97)
    }

    .preset-card:active {
      transform: scale(0.97);
      box-shadow: none
    }

    /* Hit area extensions — bring small controls to 40×40px without changing visual size */
    .icon-btn::before {
      content: '';
      position: absolute;
      inset: -4px
    }

    .row-action {
      position: relative
    }

    .row-action::before {
      content: '';
      position: absolute;
      inset: -6px
    }

    /* Alert row stagger — rows cascade in so the inbox feels alive, not like a page dump */
    @keyframes rowStaggerIn {
      from {
        opacity: 0;
        transform: translateY(6px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    .list-body .alert-row:nth-child(1) {
      animation: rowStaggerIn .22s var(--ease) both
    }

    .list-body .alert-row:nth-child(2) {
      animation: rowStaggerIn .22s .04s var(--ease) both
    }

    .list-body .alert-row:nth-child(3) {
      animation: rowStaggerIn .22s .08s var(--ease) both
    }

    .list-body .alert-row:nth-child(4) {
      animation: rowStaggerIn .22s .12s var(--ease) both
    }

    .list-body .alert-row:nth-child(5) {
      animation: rowStaggerIn .22s .16s var(--ease) both
    }

    .list-body .alert-row:nth-child(n+6) {
      animation: rowStaggerIn .22s .20s var(--ease) both
    }

    /* Detail pane section stagger — content arrives after the panel slides in */
    @keyframes sectionIn {
      from {
        opacity: 0;
        transform: translateY(8px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    .detail-header {
      animation: sectionIn .2s .08s var(--ease) both
    }

    .detail-body .detail-section:nth-child(1) {
      animation: sectionIn .2s .14s var(--ease) both
    }

    .detail-body .detail-section:nth-child(2) {
      animation: sectionIn .2s .18s var(--ease) both
    }

    .detail-body .detail-section:nth-child(3) {
      animation: sectionIn .2s .22s var(--ease) both
    }

    .detail-body .detail-section:nth-child(4) {
      animation: sectionIn .2s .26s var(--ease) both
    }

    .detail-footer {
      animation: sectionIn .2s .28s var(--ease) both
    }

    /* Preset card stagger — each card cascades in so the choice screen feels intentional */
    @keyframes cardIn {
      from {
        opacity: 0;
        transform: translateY(10px) scale(0.98)
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1)
      }
    }

    .preset-card:nth-child(1) {
      animation: cardIn .22s var(--ease) both
    }

    .preset-card:nth-child(2) {
      animation: cardIn .22s .05s var(--ease) both
    }

    .preset-card:nth-child(3) {
      animation: cardIn .22s .10s var(--ease) both
    }

    .preset-card:nth-child(4) {
      animation: cardIn .22s .15s var(--ease) both
    }

    /* Preset cards — distinct icon colors so cards don't all read the same weight */
    .preset-card:nth-child(1) .preset-icon {
      background: var(--critical-soft);
      color: var(--critical)
    }

    .preset-card:nth-child(2) .preset-icon {
      background: var(--important-soft);
      color: var(--important)
    }

    .preset-card:nth-child(3) .preset-icon {
      background: var(--info-soft);
      color: var(--info)
    }

    .preset-card:nth-child(4) .preset-icon {
      background: var(--bg-active);
      color: var(--text-2)
    }

    /* Larger icon container to carry the color story */
    .preset-icon {
      width: 36px;
      height: 36px;
      border-radius: var(--r);
      margin-bottom: 12px
    }
  </style>

    /*═══════════════════════════════════════════════════════════════
      TIME UTILS
    ═══════════════════════════════════════════════════════════════*/
    function timeAgo(ms) {
      if (!ms) return 'Never';
      const d = NOW - new Date(ms).getTime();
      if (d < 60 * MIN) return Math.max(1, Math.floor(d / MIN)) + ' min ago';
      if (d < 24 * HOUR) return Math.floor(d / HOUR) + 'h ago';
      if (d < 2 * DAY) return 'Yesterday';
      if (d < 7 * DAY) return Math.floor(d / DAY) + 'd ago';
      const dt = new Date(ms);
      return dt.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    }
    function clockTime(ms) {
      const d = new Date(ms); let h = d.getHours(); const m = d.getMinutes().toString().padStart(2, '0');
      const ap = h >= 12 ? 'pm' : 'am'; h = h % 12 || 12;
      return `${h}:${m} ${ap}`;
    }
    function dayLabel(ms) {
      const d = NOW - new Date(ms).getTime();
      if (d < 24 * HOUR) return 'Today';
      if (d < 2 * DAY) return 'Yesterday';
      if (d < 7 * DAY) return 'This week';
      return 'Earlier';
    }

    /*═══════════════════════════════════════════════════════════════
      FORECAST DATA GENERATOR
    ═══════════════════════════════════════════════════════════════*/
    function generateForecast(rule) {
      // 30 days of historical fire counts simulated from rule conditions
      const seed = rule.id?.charCodeAt?.(1) || rule.name?.charCodeAt?.(0) || 7;
      const baseRate = (rule.threshold && rule.threshold.count <= 2) ? 4 : (rule.threshold?.count <= 5 ? 1.4 : 0.4);
      const arr = [];
      for (let i = 0; i < 30; i++) {
        const noise = Math.sin((i + seed) * 0.7) * 1.4 + Math.cos((i + seed) * 0.3) * 1.1;
        let v = Math.max(0, Math.round(baseRate + noise + (i === 26 || i === 22 ? 2 : 0) + (Math.random() * 0.6 - 0.3)));
        if (rule._tooLoose) v = 30 + Math.round(Math.sin(i * .4) * 8 + Math.random() * 10);
        arr.push(v);
      }
      return arr;
    }
    function forecastTotal(arr) { return arr.reduce((a, b) => a + b, 0); }
    function forecastPerDay(arr) { return (arr.reduce((a, b) => a + b, 0) / arr.length).toFixed(1); }

        let timer; search.oninput = () => { clearTimeout(timer); timer = setTimeout(() => { state.inboxFilter.search = search.value; renderView(); search?.focus(); }, 180); };
        header.querySelector('#refresh-btn').onclick = () => {
          const btn = header.querySelector('#refresh-btn');
          btn.innerHTML = `<div class="spinner"></div>`;
          setTimeout(() => { btn.innerHTML = svg('refresh', 13); toast('Inbox up to date'); }, 600);
        };
      }, 0);

      const container = el('div', { style: 'flex:1;display:flex;overflow:hidden;width:100%' });
      container.appendChild(listPane);

      // Detail pane if alert selected
      if (state.selectedAlertId) {
        const a = ALERTS_DATA.find(x => x.id === state.selectedAlertId);
        if (a) container.appendChild(detailPane(a));
      }

      wrap.appendChild(container);
      return container;
    }

    function alertRow(a) {
      const r = RULE(a.ruleId), t = TOPIC(a.topicId);
      const isSel = a.id === state.selectedAlertId;
      const row = el('div', { class: `alert-row ${isSel ? 'selected' : ''} ${a.read ? 'read' : ''}`, 'data-id': a.id });
      row.innerHTML = `
    <div class="alert-bar bar-${a.severity}"></div>
    <div class="unread-indicator"></div>
    <div class="alert-main">
      <div class="alert-title-row">
        <span class="alert-title">${r?.name || 'Unknown rule'}</span>
        <span class="alert-time">${timeAgo(a.firedAt)}</span>
      </div>
      <div class="alert-meta">
        <span class="sev ${a.severity}"><span class="sev-dot"></span>${a.severity}</span>
        <span class="dot-sep">•</span>
        <span>${t?.name || '—'}</span>
        <span class="dot-sep">•</span>
        <span class="meta-summary">${a.matchCount} mentions matched</span>
      </div>
    </div>
    <div class="alert-actions">
      <button class="row-action" data-act="mute" title="Mute rule">${svg('mute', 14)}</button>

    </div>`;

        state.selectedAlertId = a.id;
        a.read = true;
        state.route.name = 'alert-detail';
        renderAll();
      };
      row.querySelector('[data-act="mute"]').onclick = (e) => { e.stopPropagation(); muteAlert(a.id); };
      row.querySelector('[data-act="dismiss"]').onclick = (e) => { e.stopPropagation(); dismissAlert(a.id); };
      return row;
    }

    /*═══════════════════════════════════════════════════════════════
      DETAIL PANE
    ═══════════════════════════════════════════════════════════════*/
    function detailPane(a) {
      const r = RULE(a.ruleId), t = TOPIC(a.topicId);
      const mentions = MENTION_BANK[a.mentionsKey] || [];
      const pane = el('div', { class: 'detail-pane' });
      pane.innerHTML = `
    <div class="detail-header">
      <div class="detail-top">
        <div class="detail-meta">
          <span class="sev ${a.severity}"><span class="sev-dot"></span>${a.severity}</span>

          <span>Fired at ${clockTime(a.firedAt)} · ${timeAgo(a.firedAt)}</span>
        </div>
        <button class="icon-btn" id="close-detail" title="Close">${svg('close', 14)}</button>
      </div>
      <div class="detail-title">${r?.name || ''}</div>
      <div class="detail-sublink">
        <span>Rule: <a href="#" data-edit-rule>${r?.name}</a></span>
        <span class="dot-sep">•</span>
        <span>Topic: <a href="#" data-topic="${t?.id}">${t?.name}</a></span>
      </div>
    </div>
    <div class="detail-body">
      <div class="detail-section">
        <div class="condition-banner ${a.severity}">

      <div class="detail-section">
        <div class="section-label">Matched conditions</div>
        <div class="chips">${a.matched.map(m => {

      }).join('')}</div>
      </div>
      <div class="detail-section">
        <div class="section-label" style="display:flex;align-items:center;justify-content:space-between">
          <span>Sample mentions <span style="color:var(--text-3);font-weight:400">(${a.matchCount})</span></span>
          <a href="#" style="font-size:11px;text-transform:none;letter-spacing:0;font-weight:500">View all ${svg('ext', 10)}</a>
        </div>
        ${mentions.slice(0, a.severity === 'critical' ? 3 : 2).map(m => mentionCard(m)).join('')}
      </div>
      <div class="detail-section">
        <div class="section-label">Recipients</div>
        <div style="font-size:12px;color:var(--text-2)">${(t?.watchers || []).slice(0, 3).join(', ')}${(t?.watchers || []).length > 3 ? ` +${t.watchers.length - 3} more` : ''} · notified by in-product${a.severity === 'critical' ? ' + email' : ''}</div>
      </div>
    </div>
    <div class="detail-footer">
      <button class="btn btn-primary btn-sm" id="ack-btn" ${a.status === 'acknowledged' ? 'disabled' : ''}>${svg('check', 13)} ${a.status === 'acknowledged' ? 'Acknowledged' : 'Acknowledge'}</button>
      <button class="btn btn-secondary btn-sm" id="mute-btn">${svg('mute', 13)} Mute</button>
      <button class="btn btn-ghost btn-sm" id="dismiss-btn">Dismiss</button>
      <div style="flex:1"></div>
      <button class="btn btn-secondary btn-sm" id="edit-rule-btn">${svg('edit', 13)} Edit rule</button>
    </div>`;

      setTimeout(() => {
        pane.querySelector('#close-detail').onclick = () => {
          state.selectedAlertId = null;
          state.route.name = 'inbox';
          renderAll();
        };
        pane.querySelector('#ack-btn').onclick = () => {
          a.status = 'acknowledged'; a.read = true;
          toast('Alert acknowledged');
          renderAll();
        };
        pane.querySelector('#mute-btn').onclick = () => muteAlert(a.id);
        pane.querySelector('#dismiss-btn').onclick = () => dismissAlert(a.id);
        const editBtn = pane.querySelector('#edit-rule-btn');
        const editLink = pane.querySelector('[data-edit-rule]');
        [editBtn, editLink].forEach(b => { if (b) b.onclick = (e) => { e.preventDefault(); openEditFromAlert(a, pane); }; });
      }, 0);

    }

    function conditionSentence(a, r) {
      if (a.severity === 'critical') return `${a.matchCount} ${r.conditions.sentiment !== 'any' ? r.conditions.sentiment + ' ' : ''}mentions in ${r.threshold.window} ${r.threshold.unit} exceeded your threshold of ${r.threshold.count}`;
      if (a.severity === 'important') return `${a.matchCount} matched mention${a.matchCount > 1 ? 's' : ''} from ${r.conditions.authorTier === 'high' ? 'verified high-tier authors' : 'authors above your tier filter'}`;
      return `${a.matchCount} matched mentions in the last ${r.threshold.window} ${r.threshold.unit}`;
    }

    function mentionCard(m) {
      const a = AUTHOR_BY_HANDLE(m.author);
      const text = m.text.replace(/<m>/g, '<mark>').replace(/<\/m>/g, '</mark>');
      return `
    <div class="mention-card">
      <div class="mention-head">
        <div class="mention-avatar" style="background:linear-gradient(135deg,${a.avatarColor},${a.avatarColor}cc)">${a.initials}</div>
        <div style="flex:1;min-width:0">
          <div class="mention-author">${a.name} <span style="color:var(--text-3);font-weight:400">${a.handle}</span></div>
          <div class="mention-platform">
            ${a.platform === 'Twitter/X' ? svg('twitter', 11) : a.platform === 'Instagram' ? svg('ig', 11) : a.platform === 'Facebook' ? svg('fb', 11) : svg('globe', 11)}
            ${a.platform} · ${a.role}${a.verified ? ` <span class="verified-badge" title="Verified">${svg('check', 10)}</span>` : ''}
          </div>
        </div>
      </div>
      <div class="mention-text">${text}</div>
      <div class="mention-foot">
        <span class="mention-stat">${(m.engagement.rt || 0).toLocaleString()} retweets</span>
        <span class="dot-sep">•</span>
        <span class="mention-stat">${(m.engagement.lk * 1000).toLocaleString().replace(/,000$/, 'k').replace(/(\d+)000$/, '$1k')} likes</span>
        <span class="dot-sep">•</span>
        <span class="mention-stat">${m.engagement.rep} replies</span>
      </div>
    </div>`;
    }

    /*═══════════════════════════════════════════════════════════════
      EDIT-FROM-ALERT (slide-in editor panel over detail)
    ═══════════════════════════════════════════════════════════════*/
    function openEditFromAlert(a, parentPane) {
      const r = RULE(a.ruleId);
      state.ruleEditor = { ruleId: r.id, draft: ruleToDraft(r), mode: 'panel', step: 'form' };

      // Widen the detail pane so alert content stays visible alongside the editor
      parentPane.classList.add('with-editor');
      parentPane.style.position = 'relative';
      const existing = parentPane.querySelector('.editor-panel');
      if (existing) existing.remove();

      const panel = el('div', { class: 'editor-panel' });
      panel.innerHTML = ruleEditorPanelHTML();
      parentPane.appendChild(panel);
      requestAnimationFrame(() => panel.classList.add('open'));

      bindRuleEditor(panel, true, () => {
        panel.classList.remove('open');
        setTimeout(() => {
          panel.remove();
          parentPane.classList.remove('with-editor');
        }, 200);
        state.ruleEditor = null;
      });
    }

                    <button class="row-action" data-act="view" title="View alerts">${svg('inbox', 13)}</button>
                    <button class="row-action" data-act="edit" title="Edit">${svg('edit', 13)}</button>
                    <button class="row-action" data-act="delete" title="Delete">${svg('trash2', 13)}</button>
                  </div>
                </td>
              </tr>`;
      }).join('')}
        </tbody>
      </table>
    </div>`;
      setTimeout(() => {
        wrap.querySelector('#new-rule-btn').onclick = () => navigate('rule-editor-new');
        wrap.querySelectorAll('tr[data-rule]').forEach(tr => {
          const rid = tr.dataset.rule;
          tr.onclick = (e) => {
            if (e.target.closest('[data-act]')) return;
            navigate(`rule-editor-${rid}`);
          };
          tr.querySelector('[data-act="view"]').onclick = (e) => {
            e.stopPropagation();
            state.inboxFilter.search = RULE(rid).name;
            navigate('inbox');
          };
          tr.querySelector('[data-act="edit"]').onclick = (e) => { e.stopPropagation(); navigate(`rule-editor-${rid}`); };
          tr.querySelector('[data-act="delete"]').onclick = (e) => {
            e.stopPropagation();
            const idx = RULES.findIndex(r => r.id === rid);

            toast(`Rule "${removed.name}" deleted`, { action: 'Undo', onAction: () => { RULES.splice(idx, 0, removed); renderAll(); } });
            renderAll();

    /*═══════════════════════════════════════════════════════════════
      VIEW: Rule editor (full-page)
    ═══════════════════════════════════════════════════════════════*/
    function blankRuleDraft() {
      return {
        name: '', topicId: 't1', severity: 'info',
        conditions: { sentiment: 'any', platform: 'any', authorTier: 'any', keywords: '' },
        threshold: { count: 5, window: 1, unit: 'hour' }, recipients: 'topic-watchers'
      };
    }
    function ruleToDraft(r) { return JSON.parse(JSON.stringify(r)); }
    function presetDraft(p) {
      const presets = {
        pr: {
          name: 'Brand Reputation Crisis', severity: 'critical',
          conditions: { sentiment: 'negative', platform: 'Twitter/X', authorTier: 'medium-or-higher', keywords: '' },
          threshold: { count: 3, window: 1, unit: 'hour' }, topicId: 't1', recipients: 'topic-watchers'
        },
        smm: {
          name: 'Engagement Spike', severity: 'important',
          conditions: { sentiment: 'any', platform: 'Instagram', authorTier: 'any', keywords: '' },
          threshold: { count: 50, window: 1, unit: 'hour' }, topicId: 't2', recipients: 'topic-watchers'
        },
        bm: {
          name: 'Share-of-Voice Trend', severity: 'info',
          conditions: { sentiment: 'any', platform: 'any', authorTier: 'any', keywords: 'Adidas' },
          threshold: { count: 25, window: 1, unit: 'day' }, topicId: 't3', recipients: 'topic-watchers'
        },
        custom: blankRuleDraft(),
      };
      return presets[p];
    }

    function viewRuleEditor() {
      if (!state.ruleEditor) state.ruleEditor = { ruleId: null, draft: blankRuleDraft(), mode: 'page', step: 'preset' };

    <button class="btn btn-primary btn-sm" id="save-rule">${svg('check', 13)} Save rule</button>`;

      if (ed.step === 'preset') {
        const presetView = el('div', { class: 'tbl-wrap', style: 'background:var(--bg-card)' });

          ].map(p => `
            <div class="preset-card" data-preset="${p.k}">
              <div class="preset-icon">${svg(p.i, 16)}</div>
              <div class="preset-name">${p.n}</div>
              <div class="preset-desc">${p.d}</div>
            </div>`).join('')}
        </div>
      </div>`;
        wrap.appendChild(presetView);
        setTimeout(() => {
          presetView.querySelectorAll('[data-preset]').forEach(c => c.onclick = () => {
            state.ruleEditor.draft = presetDraft(c.dataset.preset);
            state.ruleEditor.step = 'form';
            renderView();
          });

      } else {

        const form = el('div', { class: 'rule-editor' });
