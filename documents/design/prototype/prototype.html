    function ruleSummary(d) {
      const cs = [];
      if (d.conditions.sentiment !== 'any') cs.push(`<em>${d.conditions.sentiment}</em>`);
      cs.push('mentions');
      if (d.conditions.platform !== 'any') cs.push(`on <em>${d.conditions.platform}</em>`);
      if (d.conditions.authorTier !== 'any') cs.push(`from <em>${d.conditions.authorTier.replace(/-/g, ' ')}</em> authors`);
      if (d.conditions.keywords) cs.push(`mentioning <em>${d.conditions.keywords}</em>`);
      const t = TOPIC(d.topicId)?.name || 'this topic';
      return `Fire when ${cs.join(' ')} on <em>${t}</em> exceed <em>${d.threshold.count} per ${d.threshold.window} ${d.threshold.unit}</em>. Severity: <em>${d.severity}</em>.`;
    }

    function ruleForecastHTML(compact = false) {
      const d = state.ruleEditor.draft;
      const fakeRule = { ...d, _tooLoose: d.threshold.count <= 1 && d.conditions.sentiment === 'any' && d.conditions.platform === 'any' };
      const data = generateForecast(fakeRule);
      const total = forecastTotal(data);
      const perDay = forecastPerDay(data);
      const tooLoose = total > 200;
      const max = Math.max(...data, 1);
      const dayLabels = [];
      for (let i = 29; i >= 0; i--) {
        const dt = new Date(NOW - i * DAY);
        dayLabels.push(dt.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }));
      }
      return `
    <div class="fc-head">
      <div class="fc-stat">
        <div class="fc-stat-num">${total}</div>
        <div class="fc-stat-label">Would have fired in last 30 days</div>
      </div>
      <div class="fc-meta">~${perDay} / day<br/>Updated ${compact ? 'just now' : 'live as you edit'}</div>
    </div>
    ${tooLoose ? `
      <div class="warn-strip">
        <span class="warn-strip-icon">${svg('alertTri', 14)}</span>
        <div><strong>High fire rate.</strong> This configuration would fire ~${Math.round(perDay)} times per day. Consider raising the threshold or narrowing the filter.</div>
      </div>`: ''}
    <div class="fc-chart" id="fc-chart">
      <div class="fc-bars" id="fc-bars">
        ${data.map((v, i) => {
        const h = v === 0 ? 2 : Math.max(3, (v / max) * 82);
        const cls = tooLoose ? 'fc-bar warn' : 'fc-bar';
        const z = v === 0 ? ' zero' : '';
        return `<div class="${cls}${z}" data-day="${dayLabels[i]}" data-count="${v}" style="height:${h}px"></div>`;
      }).join('')}
      </div>
      <div class="fc-baseline"></div>
      <div class="fc-axis"><span>${dayLabels[0]}</span><span>${dayLabels[10]}</span><span>${dayLabels[20]}</span><span>${dayLabels[29]}</span></div>
    </div>
    <div class="samples-box" id="samples-box" style="display:none">
      <div class="samples-head"><div><span class="samples-day"></span> <span class="samples-sub"></span></div></div>
      <div class="samples-content"></div>
    </div>
    <div style="font-size:11px;color:var(--text-3);margin-top:10px;line-height:1.5">Click any bar to see what would have fired that day. Forecast is based on the last 30 days of mention data.</div>`;
    }

    function bindRuleEditor(scope, isPanel, onClose) {
      const update = (path, val) => {
        const parts = path.split('.');
        let obj = state.ruleEditor.draft;
        for (let i = 0; i < parts.length - 1; i++) obj = obj[parts[i]];
        obj[parts[parts.length - 1]] = val;
        refreshSummaryAndForecast(scope);
      };
      scope.querySelectorAll('[data-f]').forEach(inp => {
        if (inp.tagName === 'SELECT') inp.onchange = () => update(inp.dataset.f, inp.value);
        else inp.oninput = () => {
          const v = inp.type === 'number' ? +inp.value : inp.value;
          update(inp.dataset.f, v);
        };
      });
      scope.querySelectorAll('[data-sev-set]').forEach(p => {
        p.onclick = () => {
          state.ruleEditor.draft.severity = p.dataset.sevSet;
          // re-render this section
          if (isPanel) {
            scope.querySelector('.editor-panel-body > div').innerHTML = ruleFormFieldsHTML(true) + '<div class="editor-divider"></div>' + ruleForecastHTML(true);
            bindRuleEditor(scope, true, onClose);
          } else {
            scope.querySelector('.rule-form').innerHTML = ruleFormFieldsHTML();
            scope.querySelector('.rule-chart-side').innerHTML = ruleForecastHTML();
            bindRuleEditor(scope, false, onClose);
          }
        };
      });
      // Forecast bars
      scope.querySelectorAll('.fc-bar').forEach(bar => {
        bar.onclick = () => {
          scope.querySelectorAll('.fc-bar').forEach(b => b.classList.remove('active'));
          bar.classList.add('active');
          const box = scope.querySelector('#samples-box');
          box.style.display = 'block';
          box.querySelector('.samples-day').textContent = bar.dataset.day;
          box.querySelector('.samples-sub').textContent = `${bar.dataset.count} fire${bar.dataset.count === '1' ? '' : 's'}`;
          const draft = state.ruleEditor.draft;
          const samples = draft.conditions.sentiment === 'negative' ? MENTION_BANK.crisis : draft.conditions.platform === 'Instagram' ? MENTION_BANK.influencer : draft.conditions.keywords ? MENTION_BANK.campaign : MENTION_BANK.crisis;
          const n = Math.min(+bar.dataset.count || 1, 2);
          box.querySelector('.samples-content').innerHTML = samples.slice(0, Math.max(1, n)).map(m => mentionCard(m)).join('') || '<div style="font-size:12px;color:var(--text-3);padding:8px 0">No mentions matched on this day.</div>';
          // Show tooltip
          const existing = scope.querySelector('.fc-tip'); if (existing) existing.remove();
          const rect = bar.getBoundingClientRect(), parentRect = scope.querySelector('.fc-chart').getBoundingClientRect();
          const tip = el('div', { class: 'fc-tip' }, bar.dataset.count + (bar.dataset.count === '1' ? ' fire' : ' fires'));
          tip.style.left = (rect.left - parentRect.left + rect.width / 2) + 'px';
          tip.style.top = (rect.top - parentRect.top) + 'px';
          scope.querySelector('.fc-chart').appendChild(tip);
        };
      });
      // Close panel button
      if (isPanel && onClose) {
        scope.querySelectorAll('[data-act="close-editor"]').forEach(b => b.onclick = onClose);
        scope.querySelectorAll('[data-act="save-editor"]').forEach(b => b.onclick = () => {
          saveRule();
          onClose();
        });
      }
    }

    let _forecastDebounce;
    function refreshSummaryAndForecast(scope) {
      const d = state.ruleEditor.draft;
      // Summary updates instantly
      const sb = scope.querySelector('#rule-summary-text');
      if (sb) { sb.innerHTML = ruleSummary(d); sb.parentElement.classList.add('flash'); setTimeout(() => sb.parentElement.classList.remove('flash'), 800); }
      // Forecast updates debounced — and we only swap the chart container, not the form
      clearTimeout(_forecastDebounce);
      _forecastDebounce = setTimeout(() => {
        const isPanel = scope.classList.contains('editor-panel');
        if (isPanel) {
          // In panel mode, the chart lives below the form inside .editor-panel-body > div
          const container = scope.querySelector('.editor-panel-body > div');
          // Find divider; everything after it is forecast
          const divider = container.querySelector('.editor-divider');
          if (divider) {
            // Remove all siblings after divider
            while (divider.nextSibling) container.removeChild(divider.nextSibling);
            const tmp = document.createElement('div');
            tmp.innerHTML = ruleForecastHTML(true);
            while (tmp.firstChild) container.appendChild(tmp.firstChild);
          }
        } else {
          const chartTarget = scope.querySelector('.rule-chart-side');
          chartTarget.innerHTML = ruleForecastHTML();
        }
        // Rebind only the bar click handlers
        bindForecastBars(scope);
      }, 200);
    }

    function bindForecastBars(scope) {
      scope.querySelectorAll('.fc-bar').forEach(bar => {
        bar.onclick = () => {
          scope.querySelectorAll('.fc-bar').forEach(b => b.classList.remove('active'));
          bar.classList.add('active');
          const box = scope.querySelector('#samples-box');
          if (!box) return;
          box.style.display = 'block';
          box.querySelector('.samples-day').textContent = bar.dataset.day;
          box.querySelector('.samples-sub').textContent = `${bar.dataset.count} fire${bar.dataset.count === '1' ? '' : 's'}`;
          const draft = state.ruleEditor.draft;
          const samples = draft.conditions.sentiment === 'negative' ? MENTION_BANK.crisis : draft.conditions.platform === 'Instagram' ? MENTION_BANK.influencer : draft.conditions.keywords ? MENTION_BANK.campaign : MENTION_BANK.crisis;
          const n = Math.min(+bar.dataset.count || 1, 2);
          box.querySelector('.samples-content').innerHTML = samples.slice(0, Math.max(1, n)).map(m => mentionCard(m)).join('') || '<div style="font-size:12px;color:var(--text-3);padding:8px 0">No mentions matched on this day.</div>';
          // Tooltip
          const existing = scope.querySelector('.fc-tip'); if (existing) existing.remove();
          const rect = bar.getBoundingClientRect(), parentRect = scope.querySelector('.fc-chart').getBoundingClientRect();
          const tip = document.createElement('div'); tip.className = 'fc-tip'; tip.textContent = bar.dataset.count + (bar.dataset.count === '1' ? ' fire' : ' fires');
          tip.style.left = (rect.left - parentRect.left + rect.width / 2) + 'px';
          tip.style.top = (rect.top - parentRect.top) + 'px';
          scope.querySelector('.fc-chart').appendChild(tip);
        };
      });
    }

    function saveRule() {
      const d = state.ruleEditor.draft;
      if (!d.name) { toast('Rule name is required', { kind: 'warn' }); return; }
      if (state.ruleEditor.ruleId) {
        Object.assign(RULE(state.ruleEditor.ruleId), d);
        toast(`Rule "${d.name}" updated`);
      } else {
        const newRule = { ...d, id: `r${Date.now()}`, fired7d: 0, fired30d: 0, muteRate: 0, lastFired: null, createdBy: 'Kateryna P.', createdAt: NOW };
        RULES.unshift(newRule);
        toast(`Rule "${d.name}" created`);
      }
      state.ruleEditor = null;
      navigate('rules');
    }

    /*═══════════════════════════════════════════════════════════════
      ALERT ACTIONS
    ═══════════════════════════════════════════════════════════════*/
    function muteAlert(id) {
      const a = ALERTS_DATA.find(x => x.id === id); if (!a) return;
      const r = RULE(a.ruleId);
      // animate row out
      const row = $$(`.alert-row[data-id="${id}"]`)[0];
      if (row) row.classList.add('removing');
      setTimeout(() => {
        a.status = 'dismissed';
        a._wasMuted = true;
        if (state.selectedAlertId === id) { state.selectedAlertId = null; state.route.name = 'inbox'; }
        renderAll();
        toast(`Rule "${r?.name}" muted for this alert`, {
          action: 'Undo', timeout: 8000,
          onAction: () => { a.status = 'new'; delete a._wasMuted; renderAll(); }
        });
      }, 220);
    }
    function dismissAlert(id) {
      const a = ALERTS_DATA.find(x => x.id === id); if (!a) return;
      const row = $$(`.alert-row[data-id="${id}"]`)[0];
      if (row) row.classList.add('removing');
      const prevStatus = a.status;
      setTimeout(() => {
        a.status = 'dismissed';
        if (state.selectedAlertId === id) { state.selectedAlertId = null; state.route.name = 'inbox'; }
        renderAll();
        toast('Alert dismissed', { action: 'Undo', onAction: () => { a.status = prevStatus; renderAll(); } });
      }, 220);
    }

    /*═══════════════════════════════════════════════════════════════
      NOTIFICATION CENTER
    ═══════════════════════════════════════════════════════════════*/
    function renderNotif() {
      const root = $('#notif-center');
      const f = state.notifFilter;
      const items = ALERTS_DATA.filter(a => f === 'all' || (f === 'alerts' && true) || (f === 'unread' && !a.read));
      const sorted = [...items].sort((a, b) => b.firedAt - a.firedAt);
      const groups = {};
      sorted.forEach(a => {
        const d = dayLabel(a.firedAt);
        (groups[d] = groups[d] || []).push(a);
      });

      root.innerHTML = `
    <div class="notif-head">
      <div class="notif-title">Notifications</div>
      <button class="btn btn-ghost btn-sm" id="mark-all-read">Mark all read</button>
      <button class="icon-btn" id="close-notif">${svg('close', 14)}</button>
    </div>
    <div class="notif-tabs">
      ${[['all', 'All', ALERTS_DATA.length], ['unread', 'Unread', ALERTS_DATA.filter(a => !a.read).length], ['alerts', 'Alerts', ALERTS_DATA.length]].map(([k, l, c]) => `
        <div class="notif-tab ${f === k ? 'active' : ''}" data-f="${k}">${l} <span class="tab-count">${c}</span></div>
      `).join('')}
    </div>
    <div class="notif-body">
      ${Object.keys(groups).length === 0 ? `
        <div class="empty"><div class="empty-icon">${svg('inbox', 22)}</div>
          <div class="empty-title">All caught up</div>
          <div class="empty-body">You have no unread notifications.</div>
        </div>` :
          Object.entries(groups).map(([day, list]) => `
          <div class="notif-day-label">${day}</div>
          ${list.map(a => {
            const r = RULE(a.ruleId), t = TOPIC(a.topicId);
            return `
            <div class="notif-row ${a.read ? 'read' : 'unread'}" data-id="${a.id}">
              <div class="notif-row-bar bar-${a.severity}"></div>
              <div class="notif-row-body">
                <div class="notif-row-top">
                  <span class="sev ${a.severity}" style="font-size:9.5px;padding:1px 6px"><span class="sev-dot"></span>${a.severity}</span>
                  <span class="notif-row-name">${r?.name || ''}</span>
                  <span class="notif-row-time">${timeAgo(a.firedAt)}</span>
                </div>
                <div class="notif-row-summary">${a.matchCount} mentions · ${t?.name}</div>
                <div class="notif-row-actions">
                  <button class="btn btn-ghost btn-sm" data-act="open">${svg('arrowRight', 12)} Open</button>
                  <button class="btn btn-ghost btn-sm" data-act="dismiss">Dismiss</button>
                  <button class="btn btn-ghost btn-sm" data-act="mute">Mute rule</button>
                </div>
              </div>
            </div>`;
          }).join('')}
        `).join('')}
    </div>
    <div class="notif-foot"><a href="#" id="open-inbox-link">View all in Alerts inbox ${svg('arrowRight', 11)}</a></div>`;

      root.classList.toggle('open', state.notifOpen);
      $('#backdrop').classList.toggle('show', state.notifOpen || state.cmdkOpen);

      // events
      setTimeout(() => {
        root.querySelector('#close-notif').onclick = closeNotif;
        root.querySelector('#mark-all-read').onclick = () => { ALERTS_DATA.forEach(a => a.read = true); renderAll(); toast('All notifications marked as read'); };
        root.querySelectorAll('.notif-tab').forEach(t => t.onclick = () => { state.notifFilter = t.dataset.f; renderNotif(); });
        root.querySelectorAll('.notif-row').forEach(row => {
          const id = row.dataset.id;
          row.onclick = (e) => {
            if (e.target.closest('[data-act]')) return;
            ALERTS_DATA.find(a => a.id === id).read = true;
            state.selectedAlertId = id;
            state.route.name = 'alert-detail';
            closeNotif();
            renderAll();
          };
          row.querySelector('[data-act="open"]')?.addEventListener('click', (e) => {
            e.stopPropagation();
            ALERTS_DATA.find(a => a.id === id).read = true;
            state.selectedAlertId = id;
            state.route.name = 'alert-detail';
            closeNotif(); renderAll();
          });
          row.querySelector('[data-act="dismiss"]')?.addEventListener('click', (e) => { e.stopPropagation(); dismissAlert(id); renderNotif(); });
          row.querySelector('[data-act="mute"]')?.addEventListener('click', (e) => { e.stopPropagation(); muteAlert(id); renderNotif(); });
        });
        root.querySelector('#open-inbox-link').onclick = (e) => { e.preventDefault(); closeNotif(); navigate('inbox'); };
      }, 0);
    }
    function openNotif() { state.notifOpen = true; renderNotif(); }
    function closeNotif() { state.notifOpen = false; renderNotif(); }

    /*═══════════════════════════════════════════════════════════════
      TOAST
    ═══════════════════════════════════════════════════════════════*/
    function toast(text, opts = {}) {
      const t = el('div', { class: 'toast' });
      t.innerHTML = `
    <span class="toast-icon">${svg('check', 14)}</span>
    <span class="toast-text">${text}</span>
    ${opts.action ? `<span class="toast-action">${opts.action}</span>` : ''}
    <span class="toast-progress" style="animation-duration:${opts.timeout || 5000}ms"></span>`;
      $('#toast-stack').appendChild(t);
      if (opts.action && opts.onAction) {
        t.querySelector('.toast-action').onclick = () => {
          opts.onAction();
          removeToast(t);
        };
      }
      const timeout = opts.timeout || 5000;
      setTimeout(() => removeToast(t), timeout);
    }
    function removeToast(t) {
      if (!t.parentNode) return;
      t.classList.add('leaving');
      setTimeout(() => t.remove(), 220);
    }

    /*═══════════════════════════════════════════════════════════════
      COMMAND PALETTE (Cmd+K)
    ═══════════════════════════════════════════════════════════════*/
    function renderCmdK() {
      const root = $('#cmdk');
      root.innerHTML = `
    <div class="cmdk-input-wrap">
      ${svg('search', 14)}
      <input class="cmdk-input" id="cmdk-input" placeholder="Search alerts, rules, topics, or run a command…" autofocus />
      <kbd style="font-family:inherit;font-size:10px;padding:1px 5px;background:var(--bg);border:1px solid var(--border);border-radius:3px;color:var(--text-3)">esc</kbd>
    </div>
    <div class="cmdk-list" id="cmdk-list"></div>`;
      root.classList.toggle('open', state.cmdkOpen);
      $('#backdrop').classList.toggle('show', state.notifOpen || state.cmdkOpen);
      if (state.cmdkOpen) {
        const input = root.querySelector('#cmdk-input');
        setTimeout(() => input.focus(), 30);
        input.oninput = () => renderCmdKList(input.value);
        renderCmdKList('');
      }
    }
    function renderCmdKList(q) {
      const list = $('#cmdk-list');
      const ql = q.toLowerCase().trim();
      const items = [];

      // Navigation commands
      const navs = [
        { icon: 'inbox', label: 'Go to Inbox', shortcut: 'G I', action: () => { closeCmdK(); navigate('inbox'); } },
        { icon: 'rules', label: 'Go to Alert Rules', shortcut: 'G R', action: () => { closeCmdK(); navigate('rules'); } },
        { icon: 'plus', label: 'New rule', shortcut: 'N', action: () => { closeCmdK(); navigate('rule-editor-new'); } },
        { icon: 'topic', label: 'Go to Topics', action: () => { closeCmdK(); navigate('topics'); } },
        { icon: 'analytics', label: 'Go to Analytics', action: () => { closeCmdK(); navigate('analytics'); } },
        { icon: 'moon', label: 'Toggle dark mode', shortcut: '⇧D', action: () => { closeCmdK(); toggleDark(); } },
      ].filter(i => !ql || i.label.toLowerCase().includes(ql));

      if (navs.length) {
        items.push(`<div class="cmdk-section">Commands</div>`);
        navs.forEach((n, i) => items.push(`
      <div class="cmdk-item" data-idx="${items.length - 1}">
        <span class="cmdk-item-icon">${svg(n.icon, 13)}</span>
        <span>${n.label}</span>
        ${n.shortcut ? `<span class="cmdk-item-shortcut">${n.shortcut}</span>` : ''}
      </div>`));
      }

      // Alerts
      const matchingAlerts = ALERTS_DATA.filter(a => {
        if (!ql) return false;
        return RULE(a.ruleId)?.name.toLowerCase().includes(ql) || TOPIC(a.topicId)?.name.toLowerCase().includes(ql);
      }).slice(0, 3);
      if (matchingAlerts.length) {
        items.push(`<div class="cmdk-section">Alerts</div>`);
        matchingAlerts.forEach(a => items.push(`
      <div class="cmdk-item" data-alert="${a.id}">
        <span class="cmdk-item-icon">${svg('alerts', 13)}</span>
        <span>${RULE(a.ruleId)?.name} <span style="color:var(--text-3)">· ${TOPIC(a.topicId)?.name}</span></span>
        <span class="cmdk-item-shortcut">${timeAgo(a.firedAt)}</span>
      </div>`));
      }

      // Rules
      const matchingRules = RULES.filter(r => !ql || r.name.toLowerCase().includes(ql)).slice(0, 4);
      if (matchingRules.length) {
        items.push(`<div class="cmdk-section">Rules</div>`);
        matchingRules.forEach(r => items.push(`
      <div class="cmdk-item" data-rule="${r.id}">
        <span class="cmdk-item-icon">${svg('rules', 13)}</span>
        <span>${r.name} <span style="color:var(--text-3)">· ${TOPIC(r.topicId)?.name}</span></span>
      </div>`));
      }

      // Topics
      const matchingTopics = TOPICS.filter(t => !ql || t.name.toLowerCase().includes(ql));
      if (matchingTopics.length && ql) {
        items.push(`<div class="cmdk-section">Topics</div>`);
        matchingTopics.forEach(t => items.push(`
      <div class="cmdk-item" data-topic="${t.id}">
        <span class="cmdk-item-icon">${svg('hash', 13)}</span>
        <span>${t.name}</span>
      </div>`));
      }

      if (items.length === 0) items.push(`<div style="padding:24px;text-align:center;color:var(--text-3);font-size:12px">No results</div>`);

      list.innerHTML = items.join('');
      // Bind
      let active = 0;
      const all = list.querySelectorAll('.cmdk-item');
      all.forEach((it, i) => {
        if (i === 0) it.classList.add('active');
        it.onmousemove = () => { all.forEach(x => x.classList.remove('active')); it.classList.add('active'); active = i; };
        it.onclick = () => {
          const ai = it.dataset.alert, ri = it.dataset.rule, ti = it.dataset.topic;
          if (ai) { ALERTS_DATA.find(a => a.id === ai).read = true; state.selectedAlertId = ai; state.route.name = 'alert-detail'; closeCmdK(); renderAll(); }
          else if (ri) { closeCmdK(); navigate(`rule-editor-${ri}`); }
          else if (ti) { closeCmdK(); navigate(`topic-${ti}`); }
          else { navs.find(n => n.label === it.querySelector('span:nth-child(2)')?.textContent.trim())?.action(); }
        };
      });
    }
    function openCmdK() { state.cmdkOpen = true; renderCmdK(); }
    function closeCmdK() { state.cmdkOpen = false; renderCmdK(); }

        };
        ALERTS_DATA.unshift(newAlert);
        if (state.route.name === 'inbox' || state.route.name === 'alert-detail') renderAll();
        else { state.route.name = 'inbox'; renderAll(); }
        setTimeout(() => {
          const r = $$(`.alert-row[data-id="${newAlert.id}"]`)[0];
          if (r) r.classList.add('entering');
        }, 30);
        toast('Important alert fired · Journalist mention spike');
      },
      injectInfo() {
        const newAlert = {
          id: 'a' + Date.now(), ruleId: 'r6', topicId: 't4', severity: 'info',
          firedAt: NOW - 1 * MIN, status: 'new', read: false,
          matched: ['Keyword: #NikeHoliday'],
          matchCount: 5 + Math.floor(Math.random() * 8), mentionsKey: 'campaign'
        };
        ALERTS_DATA.unshift(newAlert);
        renderAll();
        toast('Info alert fired');
      },
      triggerToast() { toast('Sample toast notification', { action: 'Undo', onAction: () => { } }); },
      goWarning() {
        state.ruleEditor = { ruleId: null, draft: { ...blankRuleDraft(), name: 'High-volume test', threshold: { count: 1, window: 1, unit: 'hour' }, conditions: { sentiment: 'any', platform: 'any', authorTier: 'any', keywords: '' } }, mode: 'page', step: 'form' };
        state.route = { name: 'rule-editor', params: {} };
        renderAll();
      },
      goEditFromAlert() {
        const a = ALERTS_DATA.find(x => x.severity === 'critical' && x.status === 'new') || ALERTS_DATA[0];
        state.selectedAlertId = a.id; a.read = true;
        state.route.name = 'alert-detail';
        renderAll();
        setTimeout(() => {
          const pane = $('.detail-pane');
          if (pane) openEditFromAlert(a, pane);
        }, 100);
      },
      scenarioCalm() {
        ALERTS_DATA.forEach(a => { a.status = 'acknowledged'; a.read = true; });
        state.route.name = 'inbox';
        state.inboxFilter.status = 'acknowledged';
        renderAll();
        toast('Scenario: Calm · 0 unread alerts');
      },
      scenarioActive() {
        ALERTS_DATA.length = 0;
        [
          ['r1', 't1', 'critical', 'crisis', 16 * MIN, 5],
          ['r2', 't2', 'important', 'journalist', 2 * HOUR + 28 * MIN, 3],
          ['r4', 't2', 'important', 'influencer', 3 * HOUR + 12 * MIN, 1],
          ['r6', 't4', 'info', 'campaign', 4 * HOUR, 8],
          ['r3', 't1', 'info', 'drift', 1 * DAY + 6 * HOUR, 12],
        ].forEach(([rid, tid, sev, mk, ago, n], i) => {
          const r = RULE(rid);
          ALERTS_DATA.push({ id: 'sa' + i, ruleId: rid, topicId: tid, severity: sev, firedAt: NOW - ago, status: 'new', read: i > 2, matched: [`Sentiment: ${r.conditions.sentiment}`, `Platform: ${r.conditions.platform}`], matchCount: n, mentionsKey: mk });
        });
        state.inboxFilter.status = 'new';
        state.route.name = 'inbox';
        renderAll();
        toast('Scenario: Active · 3 unread, 1 critical');
      },
      scenarioCrisis() {
        document.getElementById('app').classList.add('crisis-mode');
        [1, 2, 3, 4, 5, 6].forEach((_, i) => setTimeout(() => {
          const newAlert = {
            id: 'crisis' + i, ruleId: 'r1', topicId: 't1', severity: i < 3 ? 'critical' : 'important',
            firedAt: NOW - (i + 1) * MIN, status: 'new', read: false,
            matched: ['Sentiment: negative', 'Platform: Twitter/X'],
            matchCount: 4 + Math.floor(Math.random() * 8), mentionsKey: 'crisis'
          };
          ALERTS_DATA.unshift(newAlert);
          renderAll();
        }, i * 180));
        setTimeout(() => toast('Scenario: Crisis active · multiple critical alerts firing'), 300);
      },
      scenarioEmpty() {
        ALERTS_DATA.length = 0;
        state.route.name = 'inbox';
        state.selectedAlertId = null;
        renderAll();
        toast('Scenario: Empty inbox');
      },
      reset() {
        location.reload();
      },
      toggleDark() { toggleDark(); },
      toggleMobile() {
        document.body.classList.toggle('mobile-preview');
        const has = document.body.classList.contains('mobile-preview');
        if (has) {
          document.body.style.cssText = 'max-width:420px;margin:0 auto;border-left:1px solid var(--border);border-right:1px solid var(--border);box-shadow:0 0 0 100vmax #1c1c1a;clip-path:inset(0)';
        } else {
          document.body.style.cssText = '';
        }
        renderAll();
      },
    };

    function renderDebug() {
      const fab = $('#debug-fab'), panel = $('#debug-panel');
      fab.classList.toggle('hidden', state.debugOpen);
      panel.classList.toggle('open', state.debugOpen);
      if (!state.debugOpen) return;

      const isDark = document.documentElement.classList.contains('dark');
      panel.innerHTML = `
    <div class="debug-header">
      <div class="debug-title"><span class="pulse"></span>Demo controls</div>
      <button class="debug-close" id="debug-close">${svg('close', 13)}</button>
    </div>
    <div class="debug-body">
      <div class="debug-section">
        <div class="debug-section-label">Trigger events</div>
        <div class="debug-grid">
          <button class="debug-btn" data-d="injectCritical"><span class="dbtn-icon" style="color:#ef4444">${svg('flame', 12)}</span>Critical alert</button>
          <button class="debug-btn" data-d="injectImportant"><span class="dbtn-icon" style="color:#f59e0b">${svg('alertTri', 12)}</span>Important</button>
          <button class="debug-btn" data-d="injectInfo"><span class="dbtn-icon" style="color:#6b7280">${svg('alerts', 12)}</span>Info alert</button>
          <button class="debug-btn" data-d="triggerToast"><span class="dbtn-icon">${svg('check', 12)}</span>Show toast</button>
        </div>
      </div>
      <div class="debug-section">
        <div class="debug-section-label">Scenarios</div>
        <div class="debug-grid">
          <button class="debug-btn" data-d="scenarioCalm">${svg('check', 12)} Calm day</button>
          <button class="debug-btn" data-d="scenarioActive">${svg('alerts', 12)} Active</button>
          <button class="debug-btn" data-d="scenarioCrisis">${svg('flame', 12)} Crisis mode</button>
          <button class="debug-btn" data-d="scenarioEmpty">${svg('inbox', 12)} Empty inbox</button>
        </div>
      </div>
      <div class="debug-section">
        <div class="debug-section-label">Quick jumps</div>
        <div class="debug-grid">
          <button class="debug-btn" data-d="goEditFromAlert" data-arg="">${svg('edit', 12)} Edit-from-alert</button>
          <button class="debug-btn" data-d="goWarning">${svg('alertTri', 12)} Forecast warn</button>
          <button class="debug-btn debug-btn-full" onclick="openNotif()">${svg('alerts', 12)} Open notification center</button>
          <button class="debug-btn debug-btn-full" onclick="openCmdK()">${svg('search', 12)} Open command palette ⌘K</button>
        </div>
      </div>
      <div class="debug-section">
        <div class="debug-section-label">View</div>
        <div class="debug-toggle ${isDark ? 'on' : ''}" id="dark-toggle">
          <span>${svg('moon', 12)} Dark mode</span>
          <span class="debug-toggle-switch"></span>
        </div>
      </div>
      <div class="debug-section">
        <div class="debug-section-label">State</div>
        <div class="debug-stats">
          <div class="debug-stat"><span>Alerts (total)</span><span class="debug-stat-val">${ALERTS_DATA.length}</span></div>
          <div class="debug-stat"><span>New unread</span><span class="debug-stat-val">${ALERTS_DATA.filter(a => !a.read && a.status === 'new').length}</span></div>
          <div class="debug-stat"><span>Rules</span><span class="debug-stat-val">${RULES.length}</span></div>
          <div class="debug-stat"><span>Route</span><span class="debug-stat-val">${state.route.name}</span></div>
        </div>
      </div>
      <div class="debug-section">
        <button class="debug-btn debug-btn-full danger" data-d="reset">${svg('refresh', 12)} Reset prototype</button>
      </div>
    </div>`;
      panel.querySelector('#debug-close').onclick = () => { state.debugOpen = false; renderDebug(); };
      panel.querySelectorAll('[data-d]').forEach(b => {
        b.onclick = () => DEMO[b.dataset.d]?.();
      });
      panel.querySelector('#dark-toggle').onclick = toggleDark;
    }

    /*═══════════════════════════════════════════════════════════════
      EVENTS / INIT
    ═══════════════════════════════════════════════════════════════*/
    function init() {
      // Bell
      $('#bell-btn').onclick = () => state.notifOpen ? closeNotif() : openNotif();
      // Search pill
      $('#search-pill').onclick = openCmdK;
      // Backdrop
      $('#backdrop').onclick = () => {
        if (state.notifOpen) closeNotif();
        if (state.cmdkOpen) closeCmdK();
      };
      // Debug FAB
      $('#debug-fab').onclick = () => { state.debugOpen = true; renderDebug(); };

      // Keyboard
      document.addEventListener('keydown', (e) => {
        if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') {
          if (e.key === 'Escape' && (state.cmdkOpen || state.notifOpen)) {
            if (state.cmdkOpen) closeCmdK(); else closeNotif();
          }
          return;
        }
        if ((e.metaKey || e.ctrlKey) && e.key === 'k') { e.preventDefault(); state.cmdkOpen ? closeCmdK() : openCmdK(); return; }
        if (e.key === 'Escape') {
          if (state.cmdkOpen) closeCmdK();
          else if (state.notifOpen) closeNotif();
          else if (state.debugOpen) { state.debugOpen = false; renderDebug(); }
          else if (state.selectedAlertId) { state.selectedAlertId = null; state.route.name = 'inbox'; renderAll(); }
          return;
        }
        if (e.key === 'd' || e.key === 'D') {
          if (e.shiftKey) { toggleDark(); return; }
          state.debugOpen = !state.debugOpen; renderDebug(); return;
        }
        if (e.key === '/') { e.preventDefault(); openCmdK(); return; }
        if (e.key === 'g') {
          const next = (ev) => {
            if (ev.key === 'i') navigate('inbox');
            else if (ev.key === 'r') navigate('rules');
            else if (ev.key === 't') navigate('topics');
            document.removeEventListener('keydown', next);
          };
          document.addEventListener('keydown', next, { once: true });
          return;
        }
        if (e.key === 'n' && state.route.name === 'rules') { navigate('rule-editor-new'); return; }
      });

      renderAll();

      // Welcome toast on load
      setTimeout(() => toast('Welcome — press D for demo controls, ⌘K to search', { timeout: 6000 }), 500);
    }

    // Start
    init();

  </script>

</body>

</html>
