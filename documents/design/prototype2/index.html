<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YouScan — Brand intelligence</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/base/tokens.css">
  <link rel="stylesheet" href="css/base/reset.css">
  <link rel="stylesheet" href="css/base/layout.css">
  <link rel="stylesheet" href="css/components/buttons.css">
  <link rel="stylesheet" href="css/components/badges.css">
  <link rel="stylesheet" href="css/features/notification-center.css">
  <link rel="stylesheet" href="css/features/rule-editor.css">
  <link rel="stylesheet" href="css/features/forecast-chart.css">
  <link rel="stylesheet" href="css/features/rules-list.css">
  <link rel="stylesheet" href="css/features/edit-from-alert.css">
  <link rel="stylesheet" href="css/components/toast.css">
  <link rel="stylesheet" href="css/components/command-palette.css">
  <link rel="stylesheet" href="css/features/debug-panel.css">
  <link rel="stylesheet" href="css/base/polish.css">
</head>
<body>
  <div id="app">
    <aside id="sidebar">
      <div class="brand">
        <div class="brand-mark">Y</div>
        <div class="brand-name">YouScan</div>
      </div>
      <div class="workspace">
        <div class="workspace-avatar">NU</div>
        <div class="workspace-name">Nike CEE</div>
        <svg class="workspace-chev" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="2">
          <polyline points="6 9 12 15 18 9" />
        </svg>
      </div>
      <nav class="nav-scroll" id="nav-scroll"></nav>
      <div class="nav-footer">
        <div class="user-avatar">KP</div>
        <div class="user-meta">
          <div class="user-name">Kateryna P.</div>
          <div class="user-role">PR Specialist</div>
        </div>
        <button class="icon-btn" style="width:24px;height:24px" title="Settings" aria-label="Settings"><svg width="13"
            height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <circle cx="12" cy="12" r="3" />
            <path
              d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z" />
          </svg></button>
      </div>
    </aside>

    <main>
      <header id="topbar">
        <div class="crumbs" id="crumbs"></div>
        <div class="search-pill" id="search-pill">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8" />
            <path d="m21 21-4.35-4.35" />
          </svg>
          <span>Search or jump to…</span>
          <kbd>⌘K</kbd>
        </div>
        <div class="topbar-actions">
          <button class="icon-btn" title="Help" aria-label="Help">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <circle cx="12" cy="12" r="10" />
              <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3" />
              <line x1="12" y1="17" x2="12.01" y2="17" />
            </svg>
          </button>
          <button class="icon-btn" id="bell-btn" title="Notifications" aria-label="Notifications">
            <svg class="bell-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
              stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
              <path d="M13.73 21a2 2 0 0 1-3.46 0" />
            </svg>
            <span class="bell-badge" id="bell-badge" style="display:none">0</span>
          </button>
        </div>
      </header>
      <div id="view"></div>
    </main>
  </div>

  <!-- Overlays -->
  <div class="overlay-backdrop" id="backdrop"></div>
  <aside class="notif-center" id="notif-center"></aside>
  <div class="cmdk" id="cmdk"></div>
  <div id="toast-stack"></div>

  <!-- Debug panel -->
  <div id="debug">
    <div class="debug-fab" id="debug-fab">
      <span class="pulse"></span>
      <span>Demo controls</span>
      <kbd>D</kbd>
    </div>
    <div class="debug-panel" id="debug-panel"></div>
  </div>

  <script src="js/utils/icons.js"></script>
  <script src="js/data/mock-data.js"></script>
  <script src="js/data/state.js"></script>
  <script src="js/utils/time-utils.js"></script>
  <script src="js/utils/forecast-data-generator.js"></script>
  <script src="js/views/layout.js"></script>
  <script src="js/views/alerts-inbox.js"></script>
  <script src="js/views/rule-editor.js"></script>
  <script src="js/views/rules-list.js"></script>
  <script src="js/components/notification-center.js"></script>
  <script src="js/components/toast.js"></script>
  <script src="js/components/command-palette.js"></script>
  <script src="js/components/debug-panel.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
